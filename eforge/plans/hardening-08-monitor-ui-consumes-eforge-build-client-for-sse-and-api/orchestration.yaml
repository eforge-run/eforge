name: hardening-08-monitor-ui-consumes-eforge-build-client-for-sse-and-api
description: "Refactor the monitor UI's useEforgeEvents hook to consume
  @eforge-build/client's subscribeToSession instead of instantiating EventSource
  directly, deleting the bespoke reconnect/HTTP-fallback logic. Extend
  subscribeToSession with minimal baseUrl: '' (same-origin relative-URL) support
  for browser use, document SSE vs on-demand fetch guidance, and add a
  top-of-file JSDoc block to the reducer."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-consolidate-sse-on-client
    name: Consolidate SSE subscription on @eforge-build/client
    depends_on: []
    branch: hardening-08-monitor-ui-consumes-eforge-build-client-for-sse-and-api/consolidate-sse-on-client
    agents:
      builder:
        effort: high
        rationale: subscribeToSession is currently node-only (uses node:http); adding a
          browser-compatible path plus refactoring the hook while preserving
          reducer dispatches requires careful cross-package reasoning.
    build: &a1
      - implement
      - - review-cycle
        - doc-update
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - api-consistency
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This PRD is a focused refactor touching 3-4 files across two
    packages (client + monitor-ui) with clearly enumerated changes: extend
    subscribeToSession for relative-URL mode, rewrite useEforgeEvents as a thin
    wrapper, and add documentation/JSDoc. A single planner can enumerate all
    edits and their dependencies in one session (the session-stream change is a
    prerequisite for the hook refactor, but that's a simple sequential chain,
    not an expedition signal). Excursion is the right scope. plan-review-cycle
    is included because the refactor must preserve reducer dispatch semantics
    exactly and delete (not duplicate) the bespoke reconnect logic - a plan
    quality gate catches scope creep early. For build, implement runs first;
    review-cycle (max 2 rounds, standard strictness) ensures the thin-wrapper
    contract holds and no stray EventSource usage remains, while doc-update runs
    in parallel to refresh any hook/reducer documentation touched. Single review
    strategy with correctness + api-consistency perspectives matches the risk
    profile: low-data-sensitivity frontend refactor where the main concerns are
    behavioral equivalence and clean API usage of @eforge-build/client. No
    test-write stage since the PRD's acceptance criteria are manual/build-based
    (pnpm build, rg check, network-tab verification) rather than unit-testable."
