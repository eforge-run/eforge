name: harden-extension-trust-model
description: Harden committed project/team native extension trust with
  per-extension hash trust metadata, changed-extension blocking, management
  surfaces, docs, and tests.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm docs:check
plans:
  - id: plan-01-engine-trust-foundation
    name: Engine Trust Store, Hashing, and Loader Enforcement
    depends_on: []
    branch: harden-extension-trust-model/plan-01-engine-trust-foundation
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - security
        - test
      maxRounds: 2
      evaluatorStrictness: strict
    agents:
      builder:
        effort: high
        rationale: Security-sensitive extension loader changes require careful hashing,
          persistence, and backward-compatible type updates.
      reviewer:
        effort: high
        rationale: Trust-boundary changes need close review for bypasses and accidental
          code execution before trust.
  - id: plan-02-management-surfaces
    name: Daemon, Client, CLI, MCP, and Pi Trust Management
    depends_on:
      - plan-01-engine-trust-foundation
    branch: harden-extension-trust-model/plan-02-management-surfaces
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - security
        - api
        - test
      maxRounds: 2
      evaluatorStrictness: strict
    agents:
      builder:
        effort: high
        rationale: This plan coordinates a new mutation route across shared client
          types, daemon routing, CLI rendering, and two agent integration
          surfaces.
      reviewer:
        effort: high
        rationale: Management routes change the trust boundary and must be reviewed for
          path validation, cross-origin protection, and no execution during
          trust.
  - id: plan-03-docs-and-skills
    name: Trust Model Documentation and Skill Guidance
    depends_on:
      - plan-02-management-surfaces
    branch: harden-extension-trust-model/plan-03-docs-and-skills
    build:
      - - implement
        - doc-author
      - doc-sync
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - docs
        - test
        - verify
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      doc-author:
        effort: high
        rationale: The docs must describe arbitrary code execution, hash trust records,
          limitations, and management workflows across several public surfaces.
      reviewer:
        effort: high
        rationale: Security documentation and plugin-facing instructions need close
          review for stale or misleading trust language.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - test-write
    - doc-sync
    - review-cycle
    - test-cycle
    - validate
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - security
      - api
      - docs
      - test
      - verify
    maxRounds: 3
    evaluatorStrictness: strict
  rationale: "This is a cross-cutting but cohesive security hardening feature, so
    excursion is appropriate: a single planner can cover trust-store/hash logic,
    loader enforcement, API/CLI/MCP/Pi wiring, docs, and tests without delegated
    module planning. A plan review gate is included because the work affects
    trust boundaries and user-facing APIs. The build runs documentation
    authoring alongside implementation, then adds tests, syncs existing docs,
    performs strict iterative review, runs test cycles after review fixes, and
    finishes with validation. Parallel review perspectives emphasize security,
    API compatibility, docs accuracy, test coverage, and final verification."
