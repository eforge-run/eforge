name: replace-backend-with-harness-across-the-eforge-mcp-http-skill-stack
description: 'Rename "backend" to "harness" across the public surface (MCP
  tools, daemon HTTP API, client types, engine helpers, skills) so the entire
  stack uses the term that matches the agentRuntimes schema and the
  mixed-harness reality of agent runtime profiles. Breaking change: bump
  DAEMON_API_VERSION from 9 to 10.'
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-rename-backend-to-harness
    name: Rename backend → harness across MCP, HTTP, client types, engine helpers,
      and skills
    depends_on: []
    branch: replace-backend-with-harness-across-the-eforge-mcp-http-skill-stack/plan-01-rename-backend-to-harness
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
        - api
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: "Cross-package coordinated rename touching ~18 files. Mechanical but
          unforgiving: a missed callsite breaks pnpm type-check. Sharded across
          three parallel scope groups (types/engine/monitor, MCP tools,
          skills+tests) so each shard has tight focus while the merged result
          must compile coherently."
        shards:
          - id: shard-types-engine-monitor
            roots:
              - packages/client/
            files:
              - packages/engine/src/config.ts
              - packages/monitor/src/server.ts
          - id: shard-mcp
            files:
              - packages/eforge/src/cli/mcp-proxy.ts
              - packages/pi-eforge/extensions/eforge/index.ts
          - id: shard-skills-tests
            roots:
              - eforge-plugin/skills/
              - packages/pi-eforge/skills/
            files:
              - test/config-backend-profile.test.ts
      reviewer:
        effort: high
        rationale: Reviewer must catch any missed callsite or stale 'backend' reference
          outside the legitimate-leftover allowlist (legacy YAML field, plan
          codename comment, parseRawConfigLegacy). Acceptance criterion 8
          mandates a clean grep audit.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
    - doc-update
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - api-consistency
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: This is a cross-cutting rename refactor (backend -> harness) that
    touches MCP tools, daemon HTTP API, client types, engine helpers, and skill
    files. It is a classic 'rename-and-update-all-callers' refactor with
    sequential dependencies (types must change before callers compile), which
    the guidelines explicitly call out as a negative expedition signal —
    excursion is correct. A single planner session can enumerate every file and
    edit because the PRD already lists exact line numbers and file paths.
    plan-review-cycle is added because the rename is a breaking API change
    (DAEMON_API_VERSION 9 -> 10) with parity requirements across Plugin and Pi
    extensions, so a quality gate on the plan catches missed call sites before
    build. defaultBuild uses implement followed by review-cycle (to catch missed
    renames and ensure Plugin/Pi parity) with doc-update running afterward to
    keep skill files and inline docs in sync — doc-update is sequential after
    review-cycle to avoid editing the same skill markdown files concurrently
    with reviewer fixes. Review uses single strategy with correctness and
    api-consistency perspectives at standard strictness — appropriate for a
    mechanical-but-broad rename where the main risks are missed call sites and
    inconsistent terminology, not security or data integrity. maxRounds=2 is
    sufficient because review issues here are concrete (missed renames) rather
    than design debates.
