name: improve-monitor-ui-decision-markers-by-positioning-decision-events-on-the-pipeline-timeline-and-adding-clearer-event-timeline-console-summaries
description: Improve monitor UI decision markers by positioning them on the
  pipeline timeline and adding clearer summaries for planning:decision and
  plan:build:decision events in the event timeline/console.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-monitor-ui-decision-markers
    name: Position decision events on the pipeline timeline and add event-card
      summaries
    depends_on: []
    branch: improve-monitor-ui-decision-markers-by-positioning-decision-events-on-the-pipeline-timeline-and-adding-clearer-event-timeline-console-summaries/plan-01-monitor-ui-decision-markers
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - code
      - verify
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "The PRD is a cohesive monitor-ui feature touching a single package
    (packages/monitor-ui) - reducer state shape, a few React components
    (decision-timeline, plan-row, thread-pipeline, event-card), and their tests.
    The PRD itself explicitly recommends 'excursion' profile and confirms no
    schema/daemon/engine work is needed. This is not 4+ independent subsystems,
    so expedition is unwarranted; it is also not trivial enough for errand
    (multiple files, type propagation, test updates). Compile uses planner plus
    plan-review-cycle because cross-component type propagation (DecisionPoint
    flowing through app.tsx -> thread-pipeline -> plan-row -> decision-timeline
    and into event-card) benefits from a plan-quality gate before build. Default
    build is implement followed by review-cycle to iterate on UI correctness and
    type/data-flow consistency. No public API, no docs files are named in scope,
    and no new tests beyond reducer tests are required, so doc-author/doc-sync
    and test-write/test-cycle stages are omitted. Review uses a single strategy
    with 'code' and 'verify' perspectives: 'code' covers React/TypeScript
    quality and shadcn primitive usage per project conventions; 'verify' covers
    acceptance-criteria verification (timestamp preservation, time-positioned
    markers, event-card summaries, type-check passing). Strictness is 'standard'
    since this is a UX improvement with no security or data-integrity risk, and
    maxRounds=2 is sufficient for a contained UI change."
