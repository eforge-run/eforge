name: per-build-profile-override-via-profile-flag-cli-mcp-with-prd-frontmatter-persistence
description: "Add per-build profile override via --profile flag (CLI + MCP) with
  PRD-frontmatter persistence so a frontier-profile build and a pi-local build
  can run in parallel from one daemon. Adds an optional EnqueueRequest.profile
  field, a 'profile: <name>' PRD frontmatter key, a new
  EforgeEngineOptions.profileOverride that bypasses .active-profile marker
  resolution in loadConfig, an 'override' value on the ActiveProfileSource /
  session:profile source enum, --profile flags on `eforge enqueue` and `eforge
  queue exec`, the same parameter on the eforge_build MCP tool in both
  eforge-plugin and pi-eforge, an interactive showSearchableSelectOverlay()
  picker on Pi's /eforge:build, daemon-side validation (HTTP 400) at enqueue,
  and pre-flight + worker-startup hard-fail handling for the rare
  delete-between-enqueue-and-build race."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-per-build-profile-override
    name: Per-build profile override via --profile flag (CLI + MCP) with
      PRD-frontmatter persistence
    depends_on: []
    branch: per-build-profile-override-via-profile-flag-cli-mcp-with-prd-frontmatter-persistence/plan-01-per-build-profile-override
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - verify
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - - doc-sync
      - test-write
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - test
      - docs
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "The PRD self-classifies as Excursion and the signals match: focused,
    cohesive plumbing across a fully mapped surface (~10 files in
    client/engine/eforge CLI/monitor/eforge-plugin/pi-eforge), with pivotal but
    enumerable design decisions and no module-level subplans. A single planner
    session can name every file, contract change, and test - this is sequential
    excursion work, not parallel module planning. Compile uses planner +
    plan-review-cycle because the change spans wire contracts (EnqueueRequest,
    ActiveProfileSource, DAEMON_API_VERSION), engine config short-circuits, and
    dual MCP surfaces; a plan-quality gate catches scope/cohesion drift before
    any code lands. Build parallelizes implement with doc-author (the change
    adds a new CLI flag, MCP tool field, and PRD frontmatter key - all
    user-facing surfaces that need fresh docs), then runs doc-sync alongside
    test-write after implement (doc-sync catches stale references to the old
    single-profile model; test-write covers the explicit vitest acceptance
    criteria including loadConfig override path, frontmatter round-trip,
    spawnPrdChild pre-flight failure, and agentRuntimeRegistry threading).
    review-cycle closes with a parallel review using code (single-entry-point
    discipline around mutateState and decisions), api (wire shape additions to
    EnqueueRequest + session:profile event + DAEMON_API_VERSION bump), test
    (acceptance-criteria coverage), and docs (MCP tool/CLI flag/frontmatter key
    documentation parity between eforge-plugin and pi-eforge per AGENTS.md).
    Standard strictness fits plumbing work that is neither security-critical nor
    cosmetic; 2 rounds is sufficient for the bounded surface."
