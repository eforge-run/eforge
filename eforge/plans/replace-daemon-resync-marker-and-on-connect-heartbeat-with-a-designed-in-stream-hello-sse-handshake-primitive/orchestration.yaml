name: replace-daemon-resync-marker-and-on-connect-heartbeat-with-a-designed-in-stream-hello-sse-handshake-primitive
description: Replace v18 daemon:resync-marker and on-connect heartbeat with a
  designed-in stream:hello SSE handshake primitive used uniformly by every SSE
  consumer (per-session and daemon-wide). Plan 01 introduces the new primitive
  additively (server emits stream:hello first; client gains
  subscribeWithSnapshot generator and aggregateSessionSummary helper) without
  breaking existing callers. Plan 02 migrates all four SSE consumers, retires
  daemon:resync-marker + on-connect heartbeat, removes
  subscribeToSession/subscribeToDaemonEvents from the public surface, adds
  BATCH_SEED dedupe in the daemon-reducer, bumps DAEMON_API_VERSION, and
  rewrites every test that locked in v18 behavior.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-handshake-primitive-additive
    name: Add stream:hello handshake primitive (additive, no removals)
    depends_on: []
    branch: replace-daemon-resync-marker-and-on-connect-heartbeat-with-a-designed-in-stream-hello-sse-handshake-primitive/plan-01-handshake-primitive-additive
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
        - test
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      builder:
        effort: xhigh
        rationale: "Novel API design: a sealed server-side helper (writeHello), a
          generator-shape public client API (subscribeWithSnapshot) sitting on
          top of an existing callback-based core via a bounded queue + promise
          resolver, plus a snapshot envelope that inlines four daemon REST
          projections. The cursor-capture rule for stream:hello must be applied
          inside the existing subscribeToStream core (not the generator) to keep
          Last-Event-ID semantics intact across reconnects. Numerous subtle
          ordering invariants require deep reasoning."
      reviewer:
        effort: high
        rationale: "API-design plan: the generator-vs-callback bridge, the
          cursor-capture rule, and the snapshot envelope shapes are easy to get
          subtly wrong (e.g. yielding events before the snapshot, double-firing
          snapshots on reconnect, leaking EventSource into public surface, loose
          typing on the three-armed iterator union)."
  - id: plan-02-migrate-consumers-retire-v18
    name: Migrate consumers to subscribeWithSnapshot and retire v18 mechanisms
    depends_on:
      - plan-01-handshake-primitive-additive
    branch: replace-daemon-resync-marker-and-on-connect-heartbeat-with-a-designed-in-stream-hello-sse-handshake-primitive/plan-02-migrate-consumers-retire-v18
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
        - test
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Spans four consumer migrations plus three coordinated removals
          (resync-marker, on-connect heartbeat, per-session historical replay)
          plus the public-export collapse. Mostly mechanical once plan-01 lands,
          but the BATCH_SEED dedupe and the `lastBatchEventId` skip-filter
          removal must be done with care so no events are dropped or duplicated
          across reconnect.
      reviewer:
        effort: high
        rationale: Multiple removal points across server, client public surface, and
          four consumers; reviewer must verify nothing else still depends on
          subscribeToSession/subscribeToDaemonEvents and that no test references
          daemon:resync-marker survives.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - test-write
      - doc-sync
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - test
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "The PRD explicitly recommends Excursion in its Profile Signal
    section, and the analysis is sound: this is one cohesive refactor unified by
    a single new primitive (the stream:hello handshake) that touches ~10–14
    coordinated files across packages/monitor, packages/client,
    packages/monitor-ui, packages/eforge, and packages/pi-eforge. It is bigger
    than an errand (multi-file, multi-package, contract change with API version
    bump) but not an expedition: the scope is one primitive with consumer
    migrations, not 4+ independently-plannable subsystems. The work also has
    strong sequential dependencies (server primitive → client generator →
    consumer migrations → tests), which is a negative signal for expedition.
    Compile stages include plan-review-cycle because plan quality matters here:
    the work deletes newly-shipped v18 code, replaces a wire-protocol primitive,
    and migrates four consumers — a flawed plan would leak in regressions across
    packages. Build stages run implement first, then test-write and doc-sync in
    parallel (test-write authors the five new/renamed test files explicitly
    enumerated in acceptance criteria 17–22; doc-sync catches stale references
    in JSDoc / inline docs / DAEMON_API_VERSION comment / any docs/ references
    to subscribeToSession). Then review-cycle gates the result. doc-author is
    omitted because the PRD does not name new documentation files to author.
    Review uses parallel strategy with code, api, and test perspectives — code
    for the SSE wire format and reducer changes, api for the public
    @eforge-build/client export surface change (subscribeWithSnapshot /
    aggregateSessionSummary replacing the old helpers, plus DAEMON_API_VERSION
    bump), and test because the PRD specifies extensive test rewrites and
    additions with precise behavioral assertions. maxRounds: 2 balances quality
    against effort for this medium-risk refactor; evaluatorStrictness: standard
    fits a non-security/non-data refactor where the regression surface is
    well-defined by the 28 acceptance criteria."
