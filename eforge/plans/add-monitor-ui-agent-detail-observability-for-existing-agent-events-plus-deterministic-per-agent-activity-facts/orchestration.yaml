name: add-monitor-ui-agent-detail-observability-for-existing-agent-events-plus-deterministic-per-agent-activity-facts
description: "Add monitor UI agent detail observability: clickable agent
  lifespan bars open a deterministic-facts drawer (final result text,
  lifecycle/usage, warnings/retries/tool activity, plus per-agent git diffstat
  facts for reliably attributable mutating stages). Adds `agentId` to
  `agent:result` and introduces a new `agent:activity` event; the monitor UI
  reducer prefers `agentId` matching with a fallback for legacy logs. No LLM
  summarization is introduced."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm docs:check
plans:
  - id: plan-01-event-contract-and-engine-emission
    name: Event contract changes and engine emission for per-agent detail
      observability
    depends_on: []
    branch: add-monitor-ui-agent-detail-observability-for-existing-agent-events-plus-deterministic-per-agent-activity-facts/plan-01-event-contract-and-engine-emission
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-monitor-ui-agent-detail-drawer
    name: Monitor UI agent detail drawer and deterministic facts rendering
    depends_on:
      - plan-01-event-contract-and-engine-emission
    branch: add-monitor-ui-agent-detail-observability-for-existing-agent-events-plus-deterministic-per-agent-activity-facts/plan-02-monitor-ui-agent-detail-drawer
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - doc-sync
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - test
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "The PRD itself recommends Excursion and the work fits that scope
    cleanly: a cohesive multi-file feature that touches the client wire schema
    (events.schemas.ts, event-registry, parity/schema tests), engine harnesses
    (claude-sdk, pi) and pipeline git helpers, monitor-ui reducer
    state/matching, and pipeline UI components (new agent detail sheet). A
    single planner session can enumerate the plans, file changes, and
    cross-package dependencies (e.g. add agentId to agent:result, add
    agent:activity event, update reducer matching, then add the drawer that
    consumes the new state) - so delegated module planning (expedition) is
    unnecessary. Sequential predecessor chains (schema -> engine emission ->
    reducer -> UI) also argue against parallel modules. plan-review-cycle is
    included because the change modifies the wire contract and reducer
    semantics, where scope/coverage issues are cheaper to catch before build.
    For build, implement is followed by doc-sync (the new agent:activity event
    and agentId field may invalidate references in monitor docs and event
    registry/wire docs; doc-author is omitted because the PRD explicitly says no
    new docs are required beyond minor updates), then review-cycle for quality
    gating. Review uses parallel perspectives: code (reducer/UI correctness,
    attribution honesty), api (additive, backward-compatible wire schema changes
    to events.schemas.ts and event-registry plus the new agent:activity event),
    and test (the PRD enumerates wire/schema, reducer, and UI tests as
    acceptance criteria). security is omitted because no auth, secret, or
    data-egress surface is touched. maxRounds=2 balances catching schema/reducer
    regressions without over-iterating on a UI-heavy feature; standard
    strictness matches a feature that is observability-only with no
    data-integrity or production-correctness risk."
