name: fix-duplicate-feat-commits-created-by-evaluator-agent
description: Fix duplicate feat commits by threading pre-implement commit SHA to
  evaluator reset target
created: 2026-04-02
compiled: 2026-04-02
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-fix-evaluator-reset-target
    name: Fix Evaluator Reset Target
    depends_on: []
    branch: fix-duplicate-feat-commits-created-by-evaluator-agent/fix-evaluator-reset-target
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: errand
  compile:
    - prd-passthrough
  defaultBuild:
    - implement
    - test-cycle
  defaultReview:
    strategy: auto
    perspectives:
      - correctness
    maxRounds: 1
    evaluatorStrictness: standard
  rationale: This is a well-defined bug fix touching 3 files with exact code
    changes specified in the PRD - classic errand scope. Using prd-passthrough
    since the PRD already serves as a complete implementation plan with specific
    file locations and code snippets. Including test-cycle because the fix
    directly involves the evaluator's git reset behavior and the PRD lists
    passing tests as acceptance criteria; the test-cycle will verify the
    threading of preImplementCommit through the pipeline and that the evaluator
    prompt template renders correctly.
