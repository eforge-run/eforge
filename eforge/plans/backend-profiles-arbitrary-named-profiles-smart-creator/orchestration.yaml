name: backend-profiles-arbitrary-named-profiles-smart-creator
description: Arbitrary-named backend profiles in eforge/backends/*.yaml,
  gitignored .active-backend marker, and an LLM-guided creator skill that uses
  pi-ai's model registry to walk users through defining new profiles. Adds
  eforge_backend (list/show/use/create/delete) and eforge_models
  (providers/list) MCP tools with matching daemon endpoints and parity across
  Claude Code plugin + Pi extension.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-engine-daemon
    name: Engine backend profile loader, models adapter, daemon endpoints, client
      types
    depends_on: []
    branch: backend-profiles-arbitrary-named-profiles-smart-creator/engine-daemon
    build: &a1
      - implement
      - - review-cycle
        - doc-update
      - test-write
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - api-consistency
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
  - id: plan-02-mcp-skills-wiring
    name: MCP tools, skills for both integrations, init updates, plugin version bump
    depends_on:
      - plan-01-engine-daemon
    branch: backend-profiles-arbitrary-named-profiles-smart-creator/mcp-skills-wiring
    build: *a1
    review: *a2
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This is a feature that spans several packages (engine config, daemon
    HTTP, client types, MCP proxy, two skill packages, init flow) but all pieces
    are tightly interdependent and sequential: engine primitives for profile
    resolution feed HTTP endpoints, which feed MCP tools, which feed the skills.
    A single planner session can enumerate all the plans and their cross-plan
    dependencies (foundation engine work first, then daemon endpoints, then MCP
    + skills in parallel). That's the classic excursion shape with a leading
    foundation plan plus dependent plans, not an expedition with independently
    planned modules. Compile uses planner + plan-review-cycle because the PRD
    has explicit acceptance criteria, parity requirements across Claude Code and
    Pi packages, and schema-validation edge cases (unknown profile fallback,
    overwrite guard, active-delete guard) that a plan quality gate will catch.
    Build starts with implement, then runs review-cycle in parallel with
    doc-update (neither of which have each other as predecessors, and the PRD
    explicitly touches user-facing skill docs, README-adjacent init flow, and
    API contract in the client package). test-write follows because the PRD
    names specific vitest files (`config-backend-profile.test.ts`,
    `models-listing.test.ts`) with enumerated cases - automated test generation
    accelerates those. Review strategy is single with two perspectives
    (correctness for the config merge/resolution logic and api-consistency for
    the parity requirement between eforge-plugin and pi-eforge consumers, plus
    the DAEMON_API_VERSION bump). Standard strictness with maxRounds=2 fits a
    feature-level change; auto-accepting suggestions keeps the loop tight."
