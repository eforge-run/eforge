name: fix-re-queue-prd-button-no-op-and-post-restart-recovery-sidecar-regression
description: Make POST /api/recover/apply run synchronously in-process and
  surface real results, and embed the recovery verdict in /api/queue so the
  verdict chip survives a daemon restart.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-fix-recovery-ux
    name: Fix Re-queue PRD no-op and post-restart sidecar regression
    depends_on: []
    branch: fix-re-queue-prd-button-no-op-and-post-restart-recovery-sidecar-regression/fix-recovery-ux
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Coordinated change across daemon route, wire types, monitor UI, plus
          a wire-version bump and tests. Needs careful contract design to keep
          the sheet's actionError surface and the queue chip in sync without
          leaving partial states.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - api-contract
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is a focused two-bug fix touching ~7 files across monitor
    server, monitor UI, client wire types, and tests - classic excursion
    territory. Not mechanical enough for errand (two coupled architectural
    changes: in-process dispatch replacement plus queue payload extension with a
    wire-version bump) and nowhere near the 4+ independent subsystems threshold
    for expedition; a single planner can enumerate all plans, files, and the
    wire-type/API-version coordination in one session. The PRD also explicitly
    recommends Excursion. Compile uses planner + plan-review-cycle to catch any
    scope drift around the wire-type bump and the parallel pi-eforge surface
    review (easy to miss). Build is the standard implement + review-cycle - no
    new public docs or APIs warrant doc-author/doc-sync (DAEMON_API_VERSION bump
    is internal wire contract, not user-facing docs), and the PRD specifies its
    own test additions inline so test-write/test-cycle stages aren't needed
    beyond what the implementer writes. Review uses correctness (file moves, git
    mutations, error surfacing) plus api-contract (QueueItem shape change,
    DAEMON_API_VERSION bump, route response contracts) at standard strictness
    with 2 rounds - the work is bug-fix risk, not security/data risk, so strict
    is overkill but lenient would miss subtle regressions in the recovery trust
    surface."
