name: wire-withhooks-into-daemon-s-in-process-auto-build-watcher
description: Wire withHooks middleware into the daemon's in-process auto-build
  watcher in packages/monitor/src/server-main.ts so user-configured hooks fire
  for parent-emitted events (notably session:start) on daemon-driven
  auto-builds, matching the existing CLI behavior.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-wire-withhooks-watcher
    name: Wire withHooks into daemon watcher
    depends_on: []
    branch: wire-withhooks-into-daemon-s-in-process-auto-build-watcher/wire-withhooks-watcher
    build: &a1
      - implement
      - - review-cycle
        - test-write
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - integration
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: This is a small, well-scoped wiring change in a single file
    (`packages/monitor/src/server-main.ts`) plus a new test in
    `test/hooks.test.ts`. It clearly fits excursion (not errand, because a hooks
    integration test must be added and the change crosses the engine/monitor
    boundary; not expedition, because there is one focused subsystem and a
    single planner can enumerate all changes). Compile uses `planner` plus a
    lightweight `plan-review-cycle` to catch any oversight in how `withHooks` is
    composed with `withRecording`. Build is `implement` followed by
    `review-cycle` in parallel with `test-write`, since the PRD explicitly
    requires a new daemon-watcher hooks test - `test-write` does not declare
    `implement` as a predecessor in this catalog (it is allowed in parallel with
    review-cycle which does). Review uses `single` strategy with correctness and
    integration perspectives at standard strictness and 2 rounds - appropriate
    for a low-risk wiring change that nonetheless must preserve DB recording
    order and existing hook behavior.
