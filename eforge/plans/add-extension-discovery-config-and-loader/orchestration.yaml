name: add-extension-discovery-config-and-loader
description: Add native eforge extension discovery, configuration, loading,
  registry capture, diagnostics, and provenance tooling.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm docs:check
  - pnpm build
plans:
  - id: plan-01-extension-runtime-foundation
    name: Extension Runtime Foundation
    depends_on: []
    branch: add-extension-discovery-config-and-loader/plan-01-extension-runtime-foundation
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - security
        - api
        - test
      maxRounds: 2
      evaluatorStrictness: strict
    agents:
      builder:
        effort: high
        rationale: New engine runtime foundation with trust, dynamic loading, and
          registry validation across config and SDK boundaries.
      reviewer:
        effort: high
        rationale: Extension loading executes user code in-process and needs careful
          security and API review.
      tester:
        effort: high
        rationale: Discovery, trust, path collision, and TS/JS loading cases need broad
          filesystem-backed coverage.
  - id: plan-02-extension-tooling-surfaces
    name: Extension Tooling Surfaces
    depends_on:
      - plan-01-extension-runtime-foundation
    branch: add-extension-discovery-config-and-loader/plan-02-extension-tooling-surfaces
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - security
        - api
        - test
      maxRounds: 2
      evaluatorStrictness: strict
    agents:
      builder:
        effort: high
        rationale: Cross-package client, daemon, CLI, MCP, and Pi wiring must preserve
          route-contract discipline and consumer parity.
      reviewer:
        effort: high
        rationale: New daemon endpoints expose executable extension diagnostics and need
          API/security review.
  - id: plan-03-extension-docs-and-reference
    name: Extension Documentation and Generated Reference
    depends_on:
      - plan-02-extension-tooling-surfaces
    branch: add-extension-discovery-config-and-loader/plan-03-extension-docs-and-reference
    build:
      - implement
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - docs
        - api
      maxRounds: 1
      evaluatorStrictness: standard
    agents:
      builder:
        effort: medium
        rationale: Documentation and generated reference synchronization across docs and
          web mirrors.
      reviewer:
        effort: medium
        rationale: Docs/API review is needed to prevent drift between runtime behavior,
          config reference, and integration surfaces.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - - test-write
      - doc-sync
    - review-cycle
    - test-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - security
      - api
      - docs
      - test
      - verify
    maxRounds: 2
    evaluatorStrictness: strict
  rationale: "This is a cohesive cross-package foundation feature, not an
    expedition: one planner can enumerate the config, discovery, loader,
    daemon/client/CLI visibility, tests, and docs sequence. Plan review is
    included because the scope is broad and touches public APIs and trust
    behavior. Documentation and implementation can start in parallel, then
    generated/changed docs and tests sync after implementation. Iterative review
    and test cycles are warranted due to loader security/trust implications,
    route/API contracts, config semantics, and required runtime tests. Strict
    parallel review covers code quality, security, API compatibility,
    documentation accuracy, test coverage, and end-to-end verification."
