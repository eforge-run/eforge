name: fix-auto-build-watcher-missing-ready-prds-without-manual-toggle
description: Replace the watcher's fs.watch dependency with a typed event bus by
  extracting the scheduling logic into a `QueueScheduler` class and having every
  queue-mutating daemon HTTP route inject `queue:mutation` events. This
  eliminates the manual auto-build OFF/ON toggle workaround currently required
  to start ready PRDs.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-event-driven-scheduler
    name: Replace fs.watch with event-driven QueueScheduler
    depends_on: []
    branch: fix-auto-build-watcher-missing-ready-prds-without-manual-toggle/event-driven-scheduler
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
        - integration
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Refactor extracts a stateful inline closure (~200 lines spanning
          prdState, semaphore, discoverNewPrds, startReadyPrds,
          propagateBlocked) into a class while simultaneously deleting fs.watch
          and threading a new EventEmitter-based bus through the daemon.
          Cross-package interface coordination (engine QueueOptions + monitor
          DaemonState + client routes) needs careful attention to avoid
          regressions in the existing toggle/abort paths.
      reviewer:
        effort: high
        rationale: "The watcher is on the critical auto-build path. Reviewer must
          verify: (a) no behavior regression in toggle OFF/ON, abort, in-flight
          drain, and queue:prd:complete branches; (b) inject-after-abort really
          is a no-op (DaemonState.injectSchedulerEvent must be cleared in every
          teardown branch in server-main.ts); (c) the event pump preserves event
          ordering between yield and bus.emit so consumers (SSE, hooks,
          persistence) still see queue:prd:complete before the scheduler
          reacts."
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
    - test-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - concurrency
      - api-contract
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This PRD is a focused daemon-internal refactor: extract a
    QueueScheduler class, replace fs.watch with explicit queue:mutation events,
    add one new HTTP route, and wire 4 emission sites in the monitor server. It
    touches multiple files across engine/, monitor/, and client/ packages, but
    the planning is straightforward and tractable in a single planner session -
    no independent subsystems to delegate. That's a textbook excursion (not
    errand because it spans ~5 files with non-trivial concurrency reasoning, and
    not expedition because there are no parallel subsystems requiring delegated
    module planning - the changes form one tightly-coupled refactor with
    sequential dependencies). Compile uses planner + plan-review-cycle because
    the PRD explicitly enumerates change sites and acceptance criteria across
    multiple packages, and a plan review catches mis-sequenced edits (e.g.
    forgetting to clear the inject callback on watcher teardown) before build.
    Build runs implement in parallel with doc-author (the PRD adds a new public
    HTTP route /api/scheduler/kick and a new client helper apiSchedulerKick that
    warrant doc updates), then doc-sync to refresh any references to fs.watch /
    watchQueue internals after the diff lands, then review-cycle for the
    concurrency-sensitive event-bus rewrite, then test-cycle because acceptance
    criterion #7 explicitly calls out new unit tests for QueueScheduler with
    stub bus + stub spawnPrdChild plus end-to-end watcher tests with stub
    onInjectEventRegister. Review config uses standard strictness with
    correctness + concurrency + api-contract perspectives: correctness for the
    scheduler state-machine extraction, concurrency for the bus/tick/event-loop
    reasoning the PRD explicitly justifies, and api-contract for the new HTTP
    route, additive API_ROUTES entry, and DaemonState interface change. Two
    rounds is enough for an excursion of this size; auto-accepting suggestions
    keeps the loop tight without rubber-stamping warnings."
