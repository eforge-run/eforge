name: add-welcome-text-to-eforge-init
description: Insert a `## Welcome` section into the two consumer-facing init
  skill files (Claude Code plugin + Pi extension) so users see a one-paragraph
  orientation before Step 1 runs on every `/eforge:init` invocation.
base_branch: main
mode: errand
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-add-welcome-section
    name: Add Welcome Section to Init Skills
    depends_on: []
    branch: add-welcome-text-to-eforge-init/welcome-section
    build:
      - implement
    review: &a1
      strategy: single
      perspectives:
        - general
      maxRounds: 1
      evaluatorStrictness: lenient
pipeline:
  scope: errand
  compile:
    - planner
  defaultBuild:
    - implement
  defaultReview: *a1
  rationale: "This PRD is a pure prompt-content change to two markdown skill files
    - inserting an identical `## Welcome` section in both
    `eforge-plugin/skills/init/init.md` and
    `packages/pi-eforge/skills/eforge-init/SKILL.md`. The PRD explicitly states
    'No code changes, no tests to update'. The acceptance criteria boil down to
    a visual diff check between the two files and manual smoke tests (which
    cannot be automated in the build pipeline). This is the textbook errand
    scope: trivial, mechanical, two-file edits with identical content. A minimal
    planner + implement pipeline is sufficient; heavy review cycles would be
    wasted cost on a copy-paste markdown insertion. Lenient/single review with
    one round provides a light sanity check on parity without overkill."
