name: w6-async-daemon-mutation-sweep
description: Audit all 23 mutating HTTP routes in the daemon
  (`packages/monitor/src/server.ts`) and harden any returning misleading success
  responses; replace the recorder's post-hoc `enqueue:complete.title ->
  runs.plan_set` derivation with a typed `planSet` payload field rippled through
  schema, registry, engine emit site, recorder, UI consumers, and tests; produce
  a tracked audit at `docs/daemon-mutation-audit.md`.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-mutation-sweep
    name: W6 daemon mutation sweep and enqueue:complete typed-field cleanup
    depends_on: []
    branch: w6-async-daemon-mutation-sweep/plan-01-mutation-sweep
    build:
      - - implement
        - doc-author
      - doc-sync
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
        - verify
        - docs
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Builder must enumerate 23 routes, classify each with a documented
          result channel, and ripple a new required Zod field through engine
          emit, recorder, registry projection, UI reducers, timeline rendering,
          and 6+ test fixtures. The typed-field change is type-cohesive
          (omitting `planSet` anywhere fails type-check) and the audit requires
          careful per-route reasoning. High effort fits.
      reviewer:
        effort: high
        rationale: Reviewer must verify (a) every one of 23 routes appears in
          `docs/daemon-mutation-audit.md` with classification + result channel,
          (b) no consumer of `enqueue:complete` still derives plan-set semantics
          from `event.title`, (c) the schema rejects events missing `planSet`.
          Cross-file consistency check across 5 packages.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
    - test-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - test
      - verify
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "The PRD itself signals 'Excursion' as the recommended profile - it's
    a bounded maintenance/focused sweep across daemon routes, event
    schemas/registry, engine emit sites, recorder behavior, and tests. The work
    is broader than a single-file errand but does not have 4+ genuinely
    independent subsystems requiring delegated module planning; it has a
    sequential dependency chain (schema -> engine emit -> recorder consumer ->
    registry projection -> route audit -> tests) that a single planner session
    can comfortably enumerate. Compile uses planner + plan-review-cycle because
    plan quality matters for an audit-style task that touches typed event
    payloads spanning multiple packages and must catch scope creep (PRD
    explicitly warns against queue/scheduler redesign). Build runs implement in
    parallel with doc-author because the PRD requires a tracked audit artifact
    (docs/daemon-mutation-audit.md) that can be drafted alongside code changes;
    doc-sync follows to catch any stale references after implementation.
    review-cycle is appropriate for quality-critical wire-protocol/event-schema
    work, and test-cycle is included because the PRD has explicit test
    requirements (enqueue:complete schema tests, recorder behavior tests,
    route-audit regression tests) and asks for type-check + vitest verification.
    Review perspectives target code (typed payload correctness and route audit
    logic), api (HTTP mutation surface and result-channel semantics), test
    (coverage of new schema field and recorder path), and verify
    (acceptance-criteria gates including grep checks for spawn(/detached: and
    the planSet derivation removal). Standard strictness with 2 rounds matches a
    maintenance sweep where correctness matters but the surface area is
    bounded."
