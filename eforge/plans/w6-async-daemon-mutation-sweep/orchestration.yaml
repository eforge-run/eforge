name: w6-async-daemon-mutation-sweep
description: Audit all 23 mutating HTTP routes in the daemon and replace the
  recorder's post-hoc enqueue:complete.title plan_set derivation with a typed
  event payload field. Produces a tracked audit document, hardens any route
  returning misleading success, and brings the enqueue:complete
  schema/registry/engine/recorder/tests into consistent alignment.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-mutation-sweep
    name: W6 daemon mutation sweep and enqueue:complete typed-field cleanup
    depends_on: []
    branch: w6-async-daemon-mutation-sweep/plan-01-mutation-sweep
    build:
      - implement
      - doc-sync
      - - test-cycle
        - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
        - verify
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Builder must enumerate 23 routes, classify each, decide per-route
          result-channel semantics, and ripple a typed schema field through 4+
          producer/consumer sites. The typed-field rename has multiple consumers
          and the audit requires careful classification - high effort fits.
      reviewer:
        effort: high
        rationale: Reviewer must verify every one of the 23 routes is in the audit,
          classification is accurate, and no consumer of enqueue:complete still
          references event.title for the planSet derivation.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
    - test-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - test
      - docs
      - verify
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "The PRD explicitly recommends an Excursion profile and describes a
    bounded maintenance sweep (audit ~23 mutating routes, replace one post-hoc
    derivation with a typed event field). It spans daemon routes, event
    schemas/registry, engine emit sites, recorder behavior, and tests, but a
    single planner session can enumerate all plan slices, file changes, and
    dependencies — so excursion is correct (none of the expedition signals: 4+
    independent subsystems, delegated module planning, parallel verticals).
    Compile uses planner + plan-review-cycle because plan quality matters for a
    cross-cutting audit that touches schemas, registry, recorder, and 23 routes;
    the review cycle catches scope creep (the PRD warns against scheduler/queue
    redesign) and ensures completeness of the route classification. Build runs
    implement in parallel with doc-author because the PRD names a new tracked
    artifact (`docs/daemon-mutation-audit.md`) that can be authored alongside
    code; doc-sync follows because schema/registry/event-payload changes can
    stale-out existing docs/comments referencing `enqueue:complete.title`.
    review-cycle (parallel perspectives across code/api/test/docs/verify) gives
    strong gating on the typed schema change, the route-result semantics, and
    the audit artifact; api and verify perspectives explicitly catch
    misleading-success-response regressions. test-cycle is included because
    acceptance criteria #8 and #10 require new tests around `enqueue:complete`
    schema, recorder behavior, and any changed route semantics, plus passing
    `pnpm type-check` and targeted vitest suites. Standard strictness fits a
    maintenance refactor with clear acceptance criteria; 2 rounds balances
    thoroughness against cost for a non-security, non-data-mutation change."
