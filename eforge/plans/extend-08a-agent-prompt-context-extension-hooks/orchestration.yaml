name: extend-08a-agent-prompt-context-extension-hooks
description: Execute captured native extension `onAgentRun` registrations at
  runtime so extensions can append role-, tier-, or phase-scoped prompt/context
  to eforge agents with clear provenance, observable diagnostics, and fail-open
  behavior. Custom tools and tool availability tuning remain deferred to
  EXTEND_08B.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-agent-context-runtime
    name: Agent prompt/context extension runtime
    depends_on: []
    branch: extend-08a-agent-prompt-context-extension-hooks/plan-01-agent-context-runtime
    build:
      - - implement
        - doc-author
      - doc-sync
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
        - docs
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Cross-cutting feature touching engine runtime, SDK types, wire
          schemas, monitor UI exhaustive handling, docs, and tests. The
          registry/harness decorator must apply consistently across every agent
          run and emit new typed events without leaking prompt text.
      reviewer:
        effort: high
        rationale: API surface change to public SDK and wire-event contract requires
          careful review for scope-creep (no EXTEND_08B tool wiring), exhaustive
          event handling, fail-open behavior, and provenance correctness.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - - doc-sync
      - test-write
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - docs
      - test
      - verify
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "The PRD itself recommends Excursion and the work is cohesive: a
    single planner can enumerate runtime wrapper, prompt composition, event
    schema additions, SDK/docs updates, and tests without delegated module
    planning. There are no 4+ independent subsystems - changes form a single
    feature slice across engine, client schemas, monitor UI, SDK, and docs with
    a shared contract (the new agent-context runtime + events). Compile uses
    planner plus plan-review-cycle because the PRD is deep with non-trivial
    scope discipline (must not bleed into EXTEND_08B tool work) and several
    medium-confidence assumptions (decorator placement, phase exposure) - a
    planning quality gate catches scope/cohesion issues before build. Build runs
    implement in parallel with doc-author since the PRD explicitly names new
    docs and an example (`agent-context.ts`, `extensions.md`,
    `extensions-api.md`, SDK README) that doc-author can stub against the plan
    without waiting for implementation. After implement, doc-sync (to update
    existing extension docs against the diff) and test-write (PRD calls for new
    wiring/runtime/schema tests) run in parallel since both only depend on
    implement. A review-cycle then closes the loop. Review uses parallel
    perspectives - code (decorator/wrapper correctness, fail-open semantics),
    api (SDK AgentRunContext/AgentRunAugmentation surface changes, event
    schema), docs (public docs + reference parity), test (coverage of
    composition/provenance/timeout/filter cases), and verify (acceptance
    criteria coverage, type-check). Strictness is standard - not a
    security/data-critical change, but multiple cross-package contracts make
    lenient too loose. Two rounds give room to fix wire-schema/registry/UI
    exhaustive handling without runaway iteration."
