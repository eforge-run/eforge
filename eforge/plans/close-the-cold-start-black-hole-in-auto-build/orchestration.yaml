name: close-the-cold-start-black-hole-in-auto-build
description: Eliminate the post-daemon-restart cold-start black hole by having
  the parent scheduler own the PRD sessionId and emit session:start at spawn
  time, passing the id to the child via --session-id so the child reuses it and
  suppresses the duplicate emission.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-parent-owns-session-id
    name: Parent scheduler owns sessionId and emits session:start at spawn
    depends_on: []
    branch: close-the-cold-start-black-hole-in-auto-build/parent-owns-session-id
    build: &a1
      - implement
      - review-cycle
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - concurrency
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This PRD is a focused, well-scoped refactor affecting two files
    (packages/engine/src/eforge.ts and packages/eforge/src/cli/index.ts) with a
    clearly described root cause and three concrete edits. A single planner
    session can easily enumerate all changes and dependencies, so excursion is
    the right scope - no need for expedition-scale module delegation. I include
    plan-review-cycle as a quality gate because the change touches subtle
    scheduler/child-process lifecycle logic (sessionId ownership, event emission
    ordering, test adjustments) where a plan review helps catch missed spots
    like the runQueue non-watcher path and the test assertions that need
    updating. For build, implement followed by review-cycle is the standard
    pattern; review-cycle will catch any correctness issues in the parent/child
    handoff. The 'correctness' and 'concurrency' perspectives match the risk
    profile - this is a concurrency-sensitive race-condition fix (parent emits
    session:start before child spawns, child must not re-emit). maxRounds=2 with
    standard strictness is sufficient for a targeted two-file change. No
    doc-update or test-write stages: the PRD explicitly notes existing tests
    need adjustment rather than new tests being written, and there's no public
    API or documentation surface being changed."
