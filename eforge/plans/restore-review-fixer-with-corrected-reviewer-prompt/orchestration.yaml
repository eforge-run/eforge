name: restore-review-fixer-with-corrected-reviewer-prompt
description: Restore review-fixer agent as serialized fix-application step in
  review cycle, correct reviewer prompt to only identify issues (not write
  fixes), preserving safe parallel execution.
created: 2026-03-31
compiled: 2026-03-31
mode: agent-restore
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-restore-review-fixer
    name: Restore Review Fixer with Corrected Reviewer Prompt
    depends_on: []
    branch: restore-review-fixer-with-corrected-reviewer-prompt/restore-review-fixer
    build:
      - implement
      - review-cycle
      - test-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
