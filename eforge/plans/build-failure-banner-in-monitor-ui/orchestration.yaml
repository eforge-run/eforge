name: build-failure-banner-in-monitor-ui
description: Add a prominent failure banner to the monitor UI that surfaces
  build errors between ArtifactsStrip and the tab selector
created: 2026-03-31
compiled: 2026-03-31
mode: ui-feature
base_branch: main
validate:
  - cd src/monitor/ui && pnpm build
plans:
  - id: plan-01-failure-banner
    name: Build Failure Banner Component
    depends_on: []
    branch: build-failure-banner-in-monitor-ui/failure-banner
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
