name: fix-global-eforge-state-json-and-event-log-concurrency-bug-for-parallel-plan-set-builds
description: Eliminate singleton .eforge/state.json and .eforge/event-log.jsonl
  persistence so independent queued plan sets can build concurrently in the same
  repository. Active orchestration state moves fully in-memory. Compile/build
  handoff becomes deterministic from the plan set name (eforge/<setName>,
  computeWorktreeBase, __merge__). Recovery sidecars reconstruct from setName +
  git/artifacts + monitor/event history; CLI-only recovery without monitor DB is
  intentionally partial and git/artifact-only.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-remove-singleton-state-persistence
    name: Remove singleton state.json/event-log.jsonl persistence and make
      compile/build handoff deterministic
    depends_on: []
    branch: fix-global-eforge-state-json-and-event-log-concurrency-bug-for-parallel-plan-set-builds/plan-01-remove-singleton-state-persistence
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - verify
        - test
      maxRounds: 2
      evaluatorStrictness: strict
    agents:
      builder:
        effort: xhigh
        rationale: Cross-file engine refactor that deletes a widely-used persistence API
          (loadState/saveState/readEventLogSnapshot/isResumable/resumeState) and
          replaces a JSON-state handoff with deterministic path computation.
          Touches orchestrator, phases, eforge.ts, recovery, schemas, and 5 test
          files. Concurrency-safety is the goal so subtle missed call sites
          would reintroduce the bug.
      reviewer:
        effort: high
        rationale: Reviewer must verify zero singleton-state references remain in active
          build/recovery paths and that the new concurrency test actually proves
          cross-build isolation.
      tester:
        effort: high
        rationale: New concurrency test must actually run two
          initializeState/Orchestrator paths in parallel against the same repo
          and prove there is no setName-mismatch failure or shared-state
          contamination.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - test-write
      - doc-sync
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - test
      - verify
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: strict
  rationale: "The PRD explicitly declares 'Profile Signal: Excursion' and the work
    fits that classification: a single cohesive design (remove singleton state
    persistence, make compile/build handoff deterministic, rewire recovery) that
    touches several engine files (state.ts, orchestrator.ts,
    orchestrator/phases.ts, eforge.ts, recovery/failure-summary.ts, plus tests)
    but is ordered and tightly coupled. There are no genuinely independent
    subsystems to delegate to module planners, and changes are sequenced (delete
    persistence helpers, then update callers, then update recovery, then tests),
    which is the classic 'sequential dependency chain' negative signal for
    expedition. Compile uses planner + plan-review-cycle because plan quality
    matters for a safety/concurrency bug touching the engine's
    single-entry-point state mutation rule; the review-evaluate gate catches
    scope drift (e.g. preserving legacy resume behavior the PRD wants deleted)
    before build. Build runs implement first, then test-write and doc-sync in
    parallel: test-write is essential because the PRD mandates a true
    Promise.all concurrency reproduction test plus updates to test/state.test.ts
    and test/orchestration-logic.test.ts, and doc-sync is needed because
    deleting loadState/saveState/readEventLogSnapshot/isResumable changes the
    public engine surface and recovery behavior documented in AGENTS.md and
    elsewhere; both legitimately depend on implement and have no mutual
    dependency, so they parallelize safely. review-cycle runs last (it conflicts
    with standalone review and supersedes it). Review uses parallel strategy
    with code, test, and verify perspectives: code catches concurrency-safety
    regressions and ensures the mutateState single-entry-point invariant is
    preserved, test confirms the Promise.all concurrency repro and updated
    suites actually prove per-build isolation rather than rubber-stamping the
    deletion, and verify gates that grep for singleton .eforge/state.json /
    event-log.jsonl reads/writes returns clean. maxRounds 2 and strict evaluator
    strictness reflect that this is a safety/concurrency bug with explicit grep
    and behavioral acceptance criteria - lenient evaluation could let residual
    saveState calls or stale resume code paths slip through. security and api
    perspectives are skipped because there is no auth/data surface and the API
    change is purely internal engine code already covered by code+verify."
