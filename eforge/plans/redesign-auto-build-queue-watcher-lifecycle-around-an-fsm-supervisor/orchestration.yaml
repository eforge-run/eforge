name: redesign-auto-build-queue-watcher-lifecycle-around-an-fsm-supervisor
description: Redesign the daemon auto-build watcher lifecycle around a
  supervisor/FSM and expose the resulting scheduler health in the monitor UI.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test -- packages/client/src/__tests__/events-schemas.test.ts
    packages/client/src/__tests__/events-wire-parity.test.ts
    packages/client/src/__tests__/events.test.ts test/daemon-recovery.test.ts
    packages/monitor/src/__tests__/auto-build-supervisor.test.ts
    packages/monitor/src/__tests__/auto-build-route.test.ts
    packages/monitor/src/__tests__/stream-hello-parity.test.ts
    packages/monitor/src/__tests__/daemon-sse-handshake.test.ts
    test/auto-build-pause-on-failure.test.ts
    test/auto-build-resume-after-failure.test.ts test/queue-scheduler.test.ts
    test/apply-recovery-route.test.ts test/extension-tooling-routes.test.ts
    test/extension-tooling-wiring.test.ts
    packages/monitor-ui/src/lib/__tests__/daemon-reducer.test.ts
    packages/monitor-ui/src/hooks/__tests__/use-daemon-events.test.ts
    packages/monitor-ui/src/components/daemon/__tests__/daemon-drawer.test.tsx
  - pnpm build
plans:
  - id: plan-01-supervisor-foundation
    name: Auto-Build Supervisor Foundation and Wire Contract
    depends_on: []
    branch: redesign-auto-build-queue-watcher-lifecycle-around-an-fsm-supervisor/plan-01-supervisor-foundation
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
        - test
        - verify
      maxRounds: 2
      evaluatorStrictness: strict
    agents:
      builder:
        effort: high
        rationale: Defines the lifecycle state model, controller contract, and additive
          wire schema used by the later daemon and UI integration.
      reviewer:
        effort: high
        rationale: The state model and wire schema are cross-package contracts that need
          careful API and type review.
      tester:
        effort: high
        rationale: Supervisor transition coverage must exercise fault, restart, pause,
          and mutation-wake edge cases without real subprocesses.
  - id: plan-02-daemon-supervisor-integration
    name: Daemon Runtime and Route Integration for Auto-Build Supervisor
    depends_on:
      - plan-01-supervisor-foundation
    branch: redesign-auto-build-queue-watcher-lifecycle-around-an-fsm-supervisor/plan-02-daemon-supervisor-integration
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
        - test
        - verify
      maxRounds: 2
      evaluatorStrictness: strict
    agents:
      builder:
        effort: xhigh
        rationale: Refactors daemon watcher lifecycle, HTTP routes, extension reload,
          pause-on-failure, and SSE projection around a single supervisor while
          preserving existing engine behavior.
      reviewer:
        effort: high
        rationale: Lifecycle races and API route semantics require detailed review
          across server-main.ts, server.ts, and integration tests.
      tester:
        effort: high
        rationale: Regression tests must simulate inert scheduler handles, draining
          watchers, queue mutation wakeups, and route delegation without real
          subprocesses.
  - id: plan-03-monitor-ui-fsm-card
    name: Monitor UI Scheduler FSM Status Card
    depends_on:
      - plan-02-daemon-supervisor-integration
    branch: redesign-auto-build-queue-watcher-lifecycle-around-an-fsm-supervisor/plan-03-monitor-ui-fsm-card
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - api
        - test
        - verify
      maxRounds: 1
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Consumes the new daemon state model across shared UI types, reducer
          snapshots, the daemon drawer, and static component tests.
      reviewer:
        effort: medium
        rationale: UI work is contained but needs API-contract and regression review for
          snapshot-only state rendering.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - test-write
    - test-cycle
    - doc-sync
    - review-cycle
    - validate
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - test
      - docs
      - verify
    maxRounds: 3
    evaluatorStrictness: standard
  rationale: Excursion is appropriate because the work is cross-cutting across
    daemon lifecycle, client wire types, monitor UI, and tests, but it is
    cohesive around one auto-build supervisor/FSM and can be planned by a single
    planner. A plan review cycle is included due to the lifecycle and
    API-state-model risk. The build runs implementation alongside planned docs
    authoring, then writes and executes tests, syncs existing docs after the
    diff is known, performs iterative multi-perspective review, and finishes
    with validation for the specified commands.
