name: lower-built-in-default-model-class-to-balanced-for-builder-fixers-and-test-agents
description: Flip the built-in default model class from `max` to `balanced` for
  the `builder`, `review-fixer`, `validation-fixer`, `test-writer`, and `tester`
  roles, and update affected tests, docs, and skill files accordingly.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-lower-defaults
    name: Lower default model class to balanced for builder/fixers/test agents
    depends_on: []
    branch: lower-built-in-default-model-class-to-balanced-for-builder-fixers-and-test-agents/lower-defaults
    build: &a1
      - implement
      - - review-cycle
        - doc-update
    review: &a2
      strategy: single
      perspectives:
        - general
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This PRD is a focused configuration change touching a small,
    well-defined set of files (engine defaults map, tests, docs, skill files,
    plugin version bump). It's more than a trivial errand because it spans
    multiple files across packages and requires coordinated updates to tests and
    two in-sync skill files, but it's clearly a single-session excursion - not
    an expedition. Compile uses planner plus plan-review-cycle to ensure the
    plan correctly enumerates all six critical files and catches any missed test
    assertions (the PRD explicitly calls out that test strings need careful
    triage). Build uses implement followed by review-cycle in parallel with
    doc-update, since the change genuinely updates three documentation files and
    the skill files must stay in sync (doc-update has no implement predecessor
    conflict in the catalog, and review-cycle runs review-fix-evaluate
    iteratively to catch mismatches). Review strategy is single with standard
    strictness and 2 rounds: this is low-risk config/docs work with clear
    acceptance criteria, so a single general perspective with a bounded loop is
    sufficient; strict would be overkill for defaults flipping from max to
    balanced, and lenient would risk missing a stale test assertion or
    out-of-sync skill file."
