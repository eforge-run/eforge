name: remove-prd-passthrough-compile-stage
description: Remove the prd-passthrough compile stage so the planner always runs
  for all profiles, enabling skip-detection for errands
created: 2026-04-13
compiled: 2026-04-13
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-remove-prd-passthrough
    name: Remove prd-passthrough compile stage
    depends_on: []
    branch: remove-prd-passthrough-compile-stage/remove-prd-passthrough
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
    maxRounds: 1
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: This is a multi-file refactor removing a compile stage and all its
    references across engine source, tests (6 files), docs, and monitor UI.
    Excursion scope fits - it touches multiple packages but all changes are
    mechanical deletions and reference updates with no new logic. The planner
    compile stage is sufficient since the PRD is highly specific with exact
    file/line targets; plan-review-cycle would add cost without value. Build
    uses implement + review-cycle with a single correctness perspective to
    verify no prd-passthrough references were missed and that
    test/type-check/build acceptance criteria are met. One review round at
    standard strictness is adequate for a deletion-only refactor with low
    regression risk. No test-write or doc-update stages needed since test
    updates are just fixing existing references and doc changes are explicitly
    specified in the PRD.
