name: resolve-tier-toolbelts-into-harness-mcp-config-and-expose-toolbelt-observability
description: Resolve tier toolbelts into harness MCP config and expose toolbelt
  observability
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-runtime-and-observability
    name: Runtime MCP filtering and observability schema
    depends_on: []
    branch: resolve-tier-toolbelts-into-harness-mcp-config-and-expose-toolbelt-observability/plan-01-runtime-and-observability
    build:
      - - implement
        - doc-author
      - doc-sync
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
        - test
      maxRounds: 2
      evaluatorStrictness: strict
    agents:
      builder:
        effort: xhigh
        rationale: Touches harness boundary in two harnesses, registry memoization
          keying that must not regress existing claudeSdk.disableSubagents
          under-keying, the shared wire schema in @eforge-build/client, and
          AgentRunOptions/ResolvedAgentConfig type additions threaded through
          resolveAgentConfig. Subtle leakage bugs (tiers sharing pi.provider but
          different toolbelts) require careful keying; high effort warranted.
      reviewer:
        effort: high
        rationale: Wire-protocol additions and harness boundary changes need thorough
          review for cross-tier leakage and debug-payload category correctness.
  - id: plan-02-profile-ux-and-docs
    name: Profile UX surfaces, monitor rendering, and docs cleanup
    depends_on:
      - plan-01-runtime-and-observability
    branch: resolve-tier-toolbelts-into-harness-mcp-config-and-expose-toolbelt-observability/plan-02-profile-ux-and-docs
    build:
      - - implement
        - doc-author
      - doc-sync
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
        - docs
      maxRounds: 1
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Touches monitor-ui shadcn components, Pi profile-commands YAML
          rendering, Claude Code skill text, eforge-plugin version bump, and
          final docs. No type churn but multiple parallel surfaces with
          skill-parity check via scripts/check-skill-parity.mjs.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - docs
      - test
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: The PRD self-classifies as 'feature / focused' (excursion) with high
    confidence, and the work, while cross-cutting (engine runtime, wire schemas,
    harnesses, monitor UI, profile UX, docs, tests), is cohesive around one
    concept (effective project MCP selection by tier plus its observability). A
    single planner session can enumerate the affected modules (eforge.ts,
    agent-runtime-registry.ts, harnesses, events.schemas.ts, monitor
    reducers/UI, profile commands, docs) and order them without delegated module
    planning, so excursion is appropriate; expedition would over-fragment a
    sequentially dependent change. plan-review-cycle is added because this slice
    touches the shared wire schema (events.schemas.ts), harness memoization
    keying (a flagged correctness risk), and Claude/Pi parity surfaces - all
    places where a scope/quality gate before build pays off. Build pipeline runs
    implement in parallel with doc-author (docs/config.md and PRD status updates
    are new content without dependency on the diff), followed by doc-sync to
    reconcile changed wire types/profile UX references in existing docs, then a
    review-cycle for quality. Review uses parallel perspectives (code for
    runtime/memoization correctness and leak prevention, api for the agent:start
    wire schema and profile list/show types, docs for user-facing
    config/observability semantics, test for coverage of omitted/none/named
    toolbelt cases and cross-tier leakage) with 2 rounds and standard strictness
    - matching a behavior-changing feature that is not security/data-critical
    but does need careful boundary checks. Security perspective is omitted
    because the PRD explicitly excludes new auth/permission surfaces and the 'no
    silent broadening' guarantee is already covered under code/test review.
