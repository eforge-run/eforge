name: dynamic-llm-driven-pipeline-composition
description: Replace hardcoded profile system with stage registry containing
  rich metadata and an intelligent pipeline composer that dynamically composes
  valid pipelines from available stages using structured outputs.
created: 2026-04-01
compiled: 2026-04-01
mode: pipeline-refactor
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-stage-registry
    name: Stage Registry with Rich Metadata
    depends_on: []
    branch: dynamic-llm-driven-pipeline-composition/stage-registry
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: strict
  - id: plan-02-structured-output-pipeline-composer
    name: Structured Output and Pipeline Composer Agent
    depends_on:
      - plan-01-stage-registry
    branch: dynamic-llm-driven-pipeline-composition/structured-output-pipeline-composer
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: strict
  - id: plan-03-integration-profile-removal
    name: Integration and Profile System Removal
    depends_on:
      - plan-01-stage-registry
      - plan-02-structured-output-pipeline-composer
    branch: dynamic-llm-driven-pipeline-composition/integration-profile-removal
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: strict
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
