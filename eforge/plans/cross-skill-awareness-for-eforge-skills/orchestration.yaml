name: cross-skill-awareness-for-eforge-skills
description: Add configFound boolean to validate API, update build/status skills
  with missing-config guidance, and add Related Skills cross-reference tables to
  all 13 eforge skill files.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-config-found-field
    name: Add configFound field to engine and client types
    depends_on: []
    branch: cross-skill-awareness-for-eforge-skills/config-found-field
    build: &a1
      - implement
      - review-cycle
    review: &a2
      strategy: auto
      perspectives:
        - correctness
        - completeness
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
  - id: plan-02-related-skills-tables
    name: Add Related Skills tables to remaining skill files and bump plugin version
    depends_on:
      - plan-01-config-found-field
    branch: cross-skill-awareness-for-eforge-skills/related-skills-tables
    build: *a1
    review: *a2
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "Excursion scope: the PRD touches ~16 files across three packages
    (engine, client, plugin, pi-extension) but the changes are coordinated
    rather than independent - no expedition-level module boundaries. The code
    change is small (one boolean field + population logic) while the bulk is
    repetitive markdown additions to 13 skill files. Plan-review-cycle is
    included at compile time because the cross-package coordination (engine
    type, client type, 13 skill files, version bump) benefits from a quality
    gate to catch missed files or inconsistent table formats before building.
    Review-cycle at build time with a completeness perspective ensures all 13
    skill files get their Related Skills tables and that the engine/client type
    changes stay in sync. Two review rounds are sufficient given the low logic
    complexity - most changes are additive markdown. Standard strictness matches
    the feature-level risk; no security or data concerns."
