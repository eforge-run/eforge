name: sharded-builds-always-go-through-review-cycle-with-a-new-verify-perspective
description: Add a new `verify` reviewer perspective that runs verification
  commands as a subprocess, drop the one-shot coordinator verification step, and
  ensure sharded plans always flow through review-cycle so verification failures
  are repaired by the iterative review-fix-evaluate loop instead of dying on the
  coordinator.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-verify-perspective-and-coordinator-rewire
    name: Verify perspective + coordinator rewire to review-cycle
    depends_on: []
    branch: sharded-builds-always-go-through-review-cycle-with-a-new-verify-perspective/main
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
    - doc-update
  defaultReview:
    strategy: parallel
    perspectives:
      - correctness
      - completeness
      - consistency
    maxRounds: 3
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is a cohesive engine refactor confined to packages/engine: one
    new prompt, perspective registration in parallel-reviewer.ts, a union update
    in review-heuristics.ts, a deletion in build-stages.ts, two prompt nudges
    (review-fixer.md, planner.md), and a runtime guard in the pipeline
    resolution site, plus targeted tests. A single planner session can
    comfortably enumerate every file change and dependency, so excursion is the
    right scope - this is not 4+ independent subsystems and there is no genuine
    module-planning delegation to gain from expedition. plan-review-cycle is
    included because the PRD explicitly leaves the runtime-guard injection site
    'TBD by exploration' and lists multiple file-line ranges that the planner
    must verify - a plan-quality gate catches a wrong file/line target before
    build. defaultBuild keeps the standard pipeline: implement does the
    structural change (including the new test/reviewer-verify.test.ts and the
    sharded-plan scenario test the PRD calls out as in-scope), then review-cycle
    runs - which is itself the subject of this PRD, so iterative
    review→fix→evaluate is meaningful here - then doc-update sweeps any
    architectural notes (the PRD modifies user-visible behavior of sharded
    builds and the reviewer perspective set, both of which warrant doc
    touch-ups). review-cycle and doc-update are kept sequential because
    review-cycle is marked non-parallelizable in the catalog. Review uses the
    parallel strategy with three diff-based perspectives (correctness for the
    deletion of runVerificationCommands and the guard logic, completeness to
    confirm both the planner-prompt rule and the runtime guard land, consistency
    to check that the new verify perspective wires symmetrically with the
    existing five) at standard strictness and 3 rounds, which matches the risk
    profile of an engine-internal change that affects orchestration but isn't
    security/data-sensitive."
