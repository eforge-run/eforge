name: close-spine-ac-shortfalls-from-event-source-spine-merge
description: "Close the three AC shortfalls (#6, #8, #1) from the
  event-source-spine merge: project lifecycle events end-to-end into monitor UI
  state, fix formatThinking snake_case wire-format mismatch, and replace the
  synthetic replay-equivalence test with a regression gate against inference
  reintroduction."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-close-spine-ac-shortfalls
    name: Close spine AC shortfalls — lifecycle events, thinking format, regression
      gate
    depends_on: []
    branch: close-spine-ac-shortfalls-from-event-source-spine-merge/plan-01-close-spine-ac-shortfalls
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - test
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - test
      - verify
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "Scope is excursion (PRD explicitly recommends Excursion in its
    Profile Signal): ~7-10 files across 4 packages (engine, client, monitor-ui,
    monitor) forming one cohesive refactor with all 8 design decisions resolved
    upfront. The three AC closures are tightly coupled (AC #6 wire-up enables AC
    #1's regression gate; AC #8 piggybacks on the same monitor-ui changeset) and
    a single planner session can enumerate all plans and resolve cross-plan
    dependencies — so this falls below the expedition bar. Sequential
    dependencies (AC #6 must land before AC #1's test rewrite) further argue
    against expedition's parallel-module model. Compile uses planner +
    plan-review-cycle to add a quality gate given the multi-package surface and
    the PRD's explicit risk callouts (generator-conversion missed callers,
    partial-application risk, reconnect duplicate handling) which benefit from a
    plan-review pass before build. Build pipeline runs implement in parallel
    with doc-author (no predecessor) since DAEMON_API_VERSION bump and the
    lifecycle wire-up are documentation-relevant; doc-sync follows sequentially
    to reconcile any stale references after implementation; review-cycle closes
    the loop with iterative review-fix-evaluate. Review uses parallel strategy
    with code (correctness of generator conversion, idempotent handler
    invariants, mutateState single-entry-point compliance), test (the AC #1
    regression-gate test must actually fail when heuristics return, plus the
    strengthened formatThinking assertion), and verify (cross-package wire
    surface — registry persist flag, DAEMON_API_VERSION bump,
    IGNORED_EVENT_TYPES removal, all six worktree-manager call sites yielding
    events). maxRounds=2 is appropriate for cohesive refactor scope;
    evaluatorStrictness=standard matches feature/refactor work without security
    or data-integrity concerns. Skipped test-write/test-cycle because the PRD
    prescribes specific test changes (lifecycle-event-emission test using
    StubHarness, rewritten event-replay-equivalence test, strengthened
    format-thinking test) that the implement stage will write directly per AC
    #1, #7, #8."
