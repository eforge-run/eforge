name: keep-public-documentation-synchronized-with-the-current-implementation
description: Correct documentation drift in README.md, docs/config.md, and
  docs/architecture.md so public docs match the current configuration schema,
  pipeline behavior, and profile/playbook implementation.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
plans:
  - id: plan-01-doc-drift-fixes
    name: Correct doc drift in README and docs/
    depends_on: []
    branch: keep-public-documentation-synchronized-with-the-current-implementation/doc-drift-fixes
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - docs
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - docs-accuracy
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This PRD is a documentation synchronization effort across README.md
    and every file under docs/. It is well-scoped to a single planner session:
    the planner can enumerate each doc file, audit it against the codebase, and
    emit targeted edit plans with clear cross-file dependencies (e.g. config.md
    depends on the actual config schema in packages/eforge). That makes
    excursion the right scope - there are no 4+ genuinely independent subsystems
    requiring delegated module planning, and the work is fundamentally a sweep
    of correlated edits where a foundation/inventory step plus follow-on plans
    is more natural than parallel modules. Compile uses planner +
    plan-review-cycle because plan quality matters here: the reviewer should
    catch cases where the planner proposed speculative content, marketing fluff,
    or rewrites instead of targeted corrections (the PRD's out-of-scope section
    explicitly forbids these). For build, doc-author runs in parallel with
    implement to handle any net-new doc content the planner identifies, then
    doc-sync runs afterward to catch any residual drift in surrounding docs from
    the implementation diff (since some plans may touch code to verify
    behavior). review-cycle with a single docs-accuracy perspective and standard
    strictness fits documentation work: the risk profile is low (no
    security/data implications), but accuracy against the codebase is the core
    acceptance criterion, so an iterative review with up to 2 rounds gives the
    reviewer room to catch lingering inaccuracies without over-engineering the
    gate. autoAcceptBelow=suggestion keeps cosmetic nits from blocking merges
    while ensuring warnings and errors are addressed."
