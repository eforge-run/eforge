name: monitor-ui-clicking-an-older-completed-build-is-a-no-op-selection-snap-back
description: "Fix monitor UI selection snap-back: clicking an older completed
  build is silently dropped because an auto-clear useEffect fires whenever the
  latest run is complete and the user has selected it, regardless of whether a
  run-to-complete transition actually occurred. Remove the auto-clear effect so
  user selection becomes explicit and persists until the user clicks a different
  build."
base_branch: main
mode: errand
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-remove-auto-clear-effect
    name: Remove auto-clear useEffect from monitor UI app.tsx
    depends_on: []
    branch: monitor-ui-clicking-an-older-completed-build-is-a-no-op-selection-snap-back/plan-01-remove-auto-clear-effect
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: errand
  compile:
    - planner
  defaultBuild:
    - implement
  defaultReview:
    strategy: single
    perspectives:
      - correctness
    maxRounds: 1
    evaluatorStrictness: lenient
  rationale: "The PRD explicitly self-identifies as an errand: a single-file
    change in packages/monitor-ui/src/app.tsx that removes 7 lines (one
    useEffect block plus its comment), with no new dependencies, no protocol
    change, and no test infrastructure required. Root cause is documented
    end-to-end with HIGH confidence, the fix is mechanical (delete the
    auto-clear effect), and acceptance criteria are concrete and verifiable via
    the standard quality gates (pnpm type-check, pnpm test, pnpm build). For
    errand scope the minimal pipeline (planner + implement) is appropriate;
    heavy review cycles, doc stages, and test-write would be overkill for a
    7-line deletion in a UI component. Review config is set to a minimal
    single-pass with lenient strictness as a safety net (in case an existing
    test depended on the snap-back behavior and needs adjustment per AC #10),
    but the bulk of validation comes from the post-merge quality gates already
    mandated by the PRD."
