name: monitor-ui-fix-delayed-swim-lane-stages-and-missing-dependency-edges
description: Eliminate the post-planning:complete delay in the monitor UI by
  synthesizing earlyOrchestration from the planning:complete event in compile
  mode, and event-driven SWR revalidation of the orchestration cache key on
  planning:complete and expedition:compile:complete.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-synthesize-and-revalidate-orchestration
    name: Synthesize earlyOrchestration on planning:complete and event-driven SWR
      revalidation
    depends_on: []
    branch: monitor-ui-fix-delayed-swim-lane-stages-and-missing-dependency-edges/synthesize-and-revalidate-orchestration
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Two coupled changes across reducer + hook + four test files. The hook
          test (Test D) is new and requires careful mock plumbing for swr's
          mutate plus subscribeToSession. Higher effort prevents
          under-specifying the mock surface.
      reviewer:
        effort: high
        rationale: The fix shape (compile-mode synthesizer + invalidateOnEvent
          extension) must match the expedition-mode pattern in
          handle-expedition.ts byte-for-byte where applicable. Reviewer needs to
          verify shape symmetry, that earlyOrchestration is consumed correctly
          via app.tsx's `??` fallback, and that planConfigs handling matches the
          daemon route.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - regression-risk
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is a focused bug fix on the monitor UI that touches a small,
    well-scoped set of files (one reducer handler, one events hook, and a
    handful of tests). Excursion is the right scope: it can be planned in a
    single planner session, the changes form a sequential chain (synthesize
    earlyOrchestration -> mutate on event -> tests), and there are no genuinely
    independent subsystems that justify expedition. The PRD already enumerates
    the exact files, lines, and test cases to update, so a plan-review-cycle is
    added to the compile phase as a quality gate to catch any scope drift or
    missed test conversions (e.g. flipping the it.todo and updating
    regression.test.ts:152) before build starts. Build is the standard implement
    + review-cycle pair: no public API surface or new docs are introduced
    (internal reducer/hook plumbing only), so doc-author/doc-sync are
    unnecessary; tests are already specified in the PRD and will be authored by
    the implementer rather than test-write. Review uses a single strategy with
    correctness and regression-risk perspectives because the change is
    timing/event-driven and the explicit risk is silently breaking expedition
    mode or the existing earlyOrchestration fallback - two focused rounds with
    standard strictness give the evaluator room to verify the synthesized shape
    matches the daemon's response and that mutate() is wired with the correct
    sessionId, without overweighting a small surface area."
