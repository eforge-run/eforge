name: orchestrator-decision-events-emit-typed-events-at-build-phase-orchestrator-decision-points-surface-in-monitor-ui
description: Add typed orchestrator-decision events to the eforge wire protocol,
  emit them at every build-phase orchestrator decision site, render them in the
  monitor UI, and keep the Pi extension passing them through cleanly.
  Build-phase only; plan-phase decisions deferred to a follow-up roadmap item.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-decision-protocol-foundation
    name: Decision-event wire protocol, engine helper, and reducer foundation
    depends_on: []
    branch: orchestrator-decision-events-emit-typed-events-at-build-phase-orchestrator-decision-points-surface-in-monitor-ui/plan-01-decision-protocol-foundation
    build:
      - implement
      - doc-sync
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - api
      maxRounds: 2
      evaluatorStrictness: standard
  - id: plan-02-decision-emission-and-ui
    name: Engine emission sites, monitor-UI rendering, and integration tests
    depends_on:
      - plan-01-decision-protocol-foundation
    branch: orchestrator-decision-events-emit-typed-events-at-build-phase-orchestrator-decision-points-surface-in-monitor-ui/plan-02-decision-emission-and-ui
    build:
      - implement
      - doc-sync
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - test
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - test
      - docs
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "The PRD itself recommends excursion scope and explains why: the work
    is multi-package (client schemas, engine emission, monitor-ui consumer, Pi
    extension, plugin version) but deeply cohesive — every emission site follows
    the same `emitBuildDecision` helper pattern and every consumer follows the
    same handler pattern. There are no genuinely independent subsystems
    requiring delegated module planning; a single planner session can enumerate
    the ~7 emission sites, the schema additions, the reducer slice, and the UI
    component file-by-file. Compile uses planner + plan-review-cycle because
    plan quality matters here: the schema design (umbrella vs granular event
    shape, payload kinds), the helper-discipline grep gate, and the
    cross-package wiring all benefit from a plan-review pass before build.
    Default build runs implement in parallel with doc-author (the PRD calls out
    AGENTS.md updates, roadmap edits, and potentially README/Pi-extension docs
    that have no dependency on the implementation diff), then doc-sync to
    refresh stale references after the diff lands (decision events are part of
    the public observability story, so existing docs may need touch-ups), then
    review-cycle for iterative quality gating. Review is parallel across
    code/api/test/docs perspectives: `code` covers the engine emission sites and
    reducer logic, `api` covers the wire-protocol Zod schema additions and
    DAEMON_API_VERSION bump (genuine public-API surface change), `test` covers
    the schema parsing tests, reducer tests, and StubHarness agent-wiring
    extension, and `docs` covers the AGENTS.md convention bullet, roadmap
    update, plugin version bump, and Pi extension parity check. Security
    perspective is omitted — no auth/secrets/data-handling surface. Verify is
    omitted — the PRD already enumerates explicit acceptance criteria that map
    cleanly to the code-perspective check. maxRounds=2 is sufficient for a
    well-specified PRD with validated assumptions; standard strictness matches a
    feature-shaped change with no data-integrity or security stakes."
