name: schema-simplification-tiers-as-the-single-configuration-axis
description: Collapse eforge agent configuration to a single axis (tiers), where
  each tier is a self-contained recipe of harness + model + effort. Eliminate
  ModelClass, agentRuntimes, defaultAgentRuntime, BUILTIN_TIER_DEFAULTS,
  MODEL_CLASS_DEFAULTS, AGENT_ROLE_MODEL_CLASS_OVERRIDES, MODEL_CLASS_TIER
  fallback, and engine-supplied defaults. Resolution becomes a 6-step algorithm
  with tier|role|plan provenance.
base_branch: main
mode: excursion
validate:
  - pnpm install
  - pnpm build
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-engine-schema
    name: Engine Schema, Resolver, Registry, and Internal Consumers
    depends_on: []
    branch: schema-simplification-tiers-as-the-single-configuration-axis/engine-schema
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
      maxRounds: 2
      evaluatorStrictness: strict
    agents:
      builder:
        effort: xhigh
        rationale: Schema rewrite ripples to ~25 files across engine, harnesses,
          pipeline, CLI, and daemon validator. The change deletes named registry
          indirection (agentRuntimes/defaultAgentRuntime) and the ModelClass
          axis simultaneously; every consumer of resolveAgentConfig and
          AgentRuntimeRegistry needs surgical updates that must all compile
          together. Requires careful, deep reasoning.
      reviewer:
        effort: high
        rationale: "Cross-file consistency check is critical: a single missed call site
          (e.g. an unfixed reference to ModelClass or agentRuntimeName) will
          only show up in CI as a type-check failure. Reviewer must verify
          completeness across the full file list."
      evaluator:
        effort: high
        rationale: Evaluator must judge whether reviewer fixes are strict improvements
          without re-introducing legacy symbols.
      tester:
        effort: high
        rationale: Test files are being rewritten around the new resolver (3-step
          provenance instead of 5-step). Tester must distinguish
          dropped-by-design tests (model class fallback chain, runtime-by-name
          registry) from regressions.
  - id: plan-02-ui-docs-skills
    name: Wizard, Monitor UI, Docs, and Skills
    depends_on:
      - plan-01-engine-schema
    branch: schema-simplification-tiers-as-the-single-configuration-axis/ui-docs-skills
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - docs
      maxRounds: 1
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Wizard rewrite is non-trivial (collect tier recipes with
          copy-from-previous-tier and preset shortcuts), and the docs/skills
          updates need to stay consistent with the new schema vocabulary across
          many files.
      reviewer:
        effort: medium
        rationale: Mostly mechanical updates once the wizard flow is right; reviewer
          needs to confirm consistency between docs, skills, and the engine
          schema landed in plan-01.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - doc-update
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - schema-consistency
      - api-surface
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: strict
  rationale: This is a coordinated schema refactor that touches multiple files but
    is sequential and tightly coupled (engine schema + resolver + wizard +
    monitor UI + tests + docs all need to move in lockstep with no backward
    compat). It is a classic 'change a definition, update all consumers'
    refactor - the negative-signal list explicitly calls these out as excursion,
    not expedition. A single planner session can enumerate every file change
    because the PRD already lists them. plan-review-cycle is added because the
    PRD is large (many deletions across overlapping enums) and quality of the
    plan really matters - missing one resolver call site would cause cascading
    failures. defaultBuild is implement first, then review-cycle in parallel
    with doc-update (doc-update has no predecessor on review, and the PRD
    explicitly calls for docs/migration note + profile authoring guide updates
    in the same PR). No test-write stage because the PRD instructs rewriting
    existing tests rather than generating new ones; the implement agent handles
    that. Review is strict with maxRounds 2 because schema/resolver code is
    high-risk - subtle provenance or fallback bugs could silently mis-resolve
    agent configs, and the 'no backward compat' rule means we have to land it
    cleanly the first time.
