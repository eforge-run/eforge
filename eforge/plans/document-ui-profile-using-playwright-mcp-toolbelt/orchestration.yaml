name: document-ui-profile-using-playwright-mcp-toolbelt
description: Publish user-facing documentation establishing a Playwright
  MCP-backed `browser-ui` toolbelt and `ui` profile as the canonical MCP-backed
  profile toolbelt example, with Pi/Claude Code profile-new skill guidance kept
  in sync.
base_branch: main
mode: excursion
validate:
  - pnpm test
  - pnpm docs:check
  - pnpm type-check
plans:
  - id: plan-01-document-ui-profile-toolbelt
    name: Document UI Profile Toolbelt (Playwright canonical example)
    depends_on: []
    branch: document-ui-profile-using-playwright-mcp-toolbelt/plan-01-document-ui-profile-toolbelt
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - docs
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - docs
      - code
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: This is a documentation-only change that touches multiple coordinated
    files (public docs site, repo docs, Pi skill, Claude plugin skill, plus a
    plugin version bump). The PRD itself recommends Excursion scope and
    explicitly rules out independently planned subsystems, so expedition is
    unwarranted. Errand is too small because synchronization across Pi/Claude
    plugin skills and multiple doc surfaces requires real planning. A single
    planner with a plan-review-cycle catches scope/quality gaps (e.g. missing
    the plugin.json version bump or Pi/Claude skill drift) before build. The
    build pipeline uses doc-author in parallel with implement (the PRD
    explicitly enumerates new doc sections to author), followed by doc-sync to
    catch stale references in adjacent docs after the diff lands, then a
    review-cycle to verify acceptance criteria. Review perspectives focus on
    'docs' (primary surface) and 'code' (to validate YAML/JSON snippets and the
    plugin.json version bump). Strategy is 'single' since there is no security
    or API surface to warrant parallel perspectives. maxRounds=2 and standard
    strictness fit a docs change where acceptance criteria are concrete but not
    safety-critical. Skipping test-write/test-cycle is correct because no
    runtime code changes (toolbelt filtering and validation already shipped per
    the PRD).
