name: dry-the-enqueue-commit-step-across-regular-and-playbook-paths
description: Add a shared commitEnqueuedPrd helper so the regular (subprocess)
  and playbook (in-process) enqueue paths both stage and commit the queue file
  the same way, fixing the playbook path's missing commit and the regular path's
  unscoped commit.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-commit-enqueued-prd-helper
    name: Add commitEnqueuedPrd helper and adopt at both enqueue paths
    depends_on: []
    branch: dry-the-enqueue-commit-step-across-regular-and-playbook-paths/commit-enqueued-prd-helper
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
    - test
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - consistency
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: >-
    This is a focused DRY refactor touching 3 source files (prd-queue.ts,
    eforge.ts, server.ts) plus one test file, with a clear, well-specified
    approach already laid out in the PRD. It's larger than an errand because it
    spans multiple files, has a latent bug fix (paths argument scoping),
    introduces a new helper, and requires test additions plus end-to-end
    verification - but it's clearly a single-session planning effort with a
    sequential dependency chain (add helper -> update call sites -> test), not
    4+ independent subsystems. Excursion is correct.


    Compile uses planner + plan-review-cycle because the PRD has subtle
    correctness requirements (preserving the try/catch around
    enqueue:commit-failed, scoping the paths argument, leaving the recovery path
    untouched, preserving enqueuePrd's pure-I/O contract) where a plan-review
    pass catches scope drift before build.


    DefaultBuild keeps it sequential: implement -> review-cycle -> test. The
    changes are small enough that parallel doc-update isn't warranted (no public
    API or user-facing docs change - this is internal refactor). test runs after
    review-cycle to validate the existing test suite plus the new
    playbook-api.test.ts assertion still passes; the PRD explicitly calls out
    pnpm test in acceptance criteria.


    Review is single-strategy with correctness + consistency perspectives over 2
    rounds at standard strictness. The risk surface is narrow (commit semantics,
    paths scoping, preserving event behavior on subprocess path), so strict
    isn't warranted, but the latent-bug-fix nature means we want at least one
    fix iteration. autoAcceptBelow suggestion keeps low-value churn out.
