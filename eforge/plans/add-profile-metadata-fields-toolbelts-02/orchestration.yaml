name: add-profile-metadata-fields-toolbelts-02
description: Add optional profile metadata fields (description, whenToUse, tags)
  to agent runtime profiles, surfaced through profile list/show/create across
  the daemon API, Claude Code MCP/skills, Pi tool/native commands, and
  documentation. Metadata is descriptive only and does not affect active profile
  selection or runtime behavior.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-engine-and-api
    name: Profile metadata schema, parsing, and daemon API
    depends_on: []
    branch: add-profile-metadata-fields-toolbelts-02/plan-01-engine-and-api
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-consumers-and-docs
    name: Surface profile metadata in MCP, Pi, skills, and docs
    depends_on:
      - plan-01-engine-and-api
    branch: add-profile-metadata-fields-toolbelts-02/plan-02-consumers-and-docs
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
        - docs
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - docs
      - test
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "The PRD explicitly classifies itself as a feature/focused change and
    recommends the Excursion build profile. It is multi-file (engine config
    parsing, daemon/client wire types, Claude Code MCP/skills, Pi
    extension/tools/skills, docs, tests) but the work is a single cohesive slice
    with sequential dependencies (types defined in engine flow through to
    daemon/client to consumers) - exactly the pattern that fits excursion, not
    expedition. A single planner session can enumerate plans and cross-file
    dependencies. Compile uses planner plus plan-review-cycle because parity
    across Claude Code and Pi integrations and explicit out-of-scope guardrails
    (no automatic selection, no toolbelt behavior) make plan quality important.
    Build runs implement in parallel with doc-author since docs/config.md needs
    new metadata documentation (named in acceptance criteria) and has no
    predecessor, then doc-sync to catch any stale references after
    implementation (skill docs, MCP tool schemas), then review-cycle for the
    quality gate. Review uses parallel strategy with code (config
    parsing/type-safety), api (wire shape parity between Claude/Pi and daemon
    routes), docs (config.md examples and skill doc accuracy), and test
    (parsing/wiring/payload coverage) perspectives - matching the explicit
    acceptance criteria. 2 rounds with standard strictness is appropriate: this
    is descriptive metadata with no runtime behavior, no security or data
    integrity risk, but parity across two consumer integrations warrants more
    than a single pass."
