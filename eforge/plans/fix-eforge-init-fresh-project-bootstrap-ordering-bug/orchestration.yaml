name: fix-eforge-init-fresh-project-bootstrap-ordering-bug
description: "Fix eforge_init fresh-project bootstrap ordering bug: ensure
  eforge/config.yaml exists on disk before any daemon profile request, in both
  mcp-proxy.ts and pi-eforge consumers, with a sentinel-write +
  cleanup-on-failure pattern that preserves the existing force:true
  content-protection behavior."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-fix-fresh-init-ordering
    name: Fix eforge_init fresh-init ordering across both consumers
    depends_on: []
    branch: fix-eforge-init-fresh-project-bootstrap-ordering-bug/fix-fresh-init-ordering
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is a focused bug fix touching two consumer files (mcp-proxy.ts
    and the Pi extension) with a clearly described two-write sentinel pattern,
    plus a small static-grep regression test. It is well above an errand (two
    synchronized consumers, failure-cleanup semantics, idempotency and force:
    true behaviors to preserve, multiple acceptance criteria including
    end-to-end repro), but nowhere near expedition - a single planner session
    can easily enumerate the file changes and dependencies. Excursion is the
    right fit. Compile uses planner + plan-review-cycle to ensure the plan
    correctly captures the AGENTS.md sync requirement between the two consumers
    and the failure-cleanup semantics. Build uses implement + review-cycle (max
    2 rounds, standard strictness, correctness perspective) since the risk is
    logical correctness of ordering and cleanup, not security or data integrity.
    No doc-update (PRD explicitly excludes CHANGELOG and there are no
    user-facing doc changes), no test-write/test stages (the PRD prescribes
    exactly one static source-grep assertion in an existing test file, which the
    implementer adds directly; integration tests are explicitly out of scope per
    AGENTS.md)."
