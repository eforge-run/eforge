name: monitor-ui-replace-harness-indicator-with-inspectable-profile-name
description: Replace the misleading single-harness indicator in the monitor UI
  session header with a clickable profile badge that opens a slide-over
  inspector revealing the profile's full config, propagated end-to-end via a new
  `session:profile` engine event.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-session-profile-event-and-inspector
    name: session:profile event end-to-end + inspectable profile badge
    depends_on: []
    branch: monitor-ui-replace-harness-indicator-with-inspectable-profile-name/session-profile-event-and-inspector
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - consistency
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This PRD touches multiple packages (engine, monitor, client,
    monitor-ui) but the work is a coherent single feature: introduce a new
    `session:profile` event, plumb it through the daemon and client, and replace
    the harness indicator with a profile badge in the UI. The dependencies are
    sequential (engine event -> daemon DB -> client types -> UI consumption),
    which is a classic ordered-excursion shape rather than independent parallel
    modules, so excursion is the right scope. A single planner session can
    comfortably enumerate all plans and file changes; expedition would
    over-fragment a tightly-coupled change. Compile uses planner +
    plan-review-cycle because the PRD spans 13 critical files with a breaking
    API version bump and explicit cleanup of dead code paths - a plan quality
    gate is worth the cost to ensure no critical file or dead-code removal is
    missed. Build uses sequential implement -> review-cycle: the new
    `profile-badge.tsx` component, event plumbing, and removal of the dormant
    `ProfileHeader`/`plan:profile` branches all benefit from iterative review.
    doc-update is omitted because the PRD explicitly does not require
    user-facing documentation changes (CLAUDE.md notes CHANGELOG is owned by the
    release flow and roadmap entries are removed once shipped). test-write is
    omitted because the AC is verified via existing `pnpm type-check` + `pnpm
    test` plus manual daemon/UI verification, and there is no new pure-logic
    surface that benefits from unit tests beyond what existing reducer/db tests
    already cover. Review uses `single` strategy with two perspectives
    (correctness for event/reducer/DB plumbing and the API version bump;
    consistency to ensure the dead-code removal is thorough and the UI patterns
    match existing shadcn/Sheet conventions per project conventions).
    maxRounds=2 with standard strictness is appropriate for feature-level risk -
    this is not security/data critical but does involve a breaking API version
    bump that must be handled cleanly."
