name: tighten-review-perspective-schema-and-surface-failures-from-parallel-reviewer
description: Tighten the review-perspective vocabulary so invalid names fail at
  compile-time validation, and surface per-perspective task failures from
  parallel-reviewer.ts as a new domain event so future failures are visible in
  the timeline instead of being silently swallowed by runParallel.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-tighten-review-perspectives
    name: Tighten review-perspective schema and surface parallel-reviewer failures
    depends_on: []
    branch: tighten-review-perspective-schema-and-surface-failures-from-parallel-reviewer/plan-01-tighten-review-perspectives
    build:
      - implement
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - test
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This PRD is a focused, well-scoped excursion: five small touches
    across four files in packages/ (events.ts, schemas.ts, config.ts,
    parallel-reviewer.ts) plus a reducer/UI test update. The changes are
    surgical (lift a string union to a const-derived enum, swap z.string() for
    z.enum(), wrap a try/catch around perspective tasks, add one event variant)
    and a single planner session can easily enumerate all file edits and
    dependencies. There's a natural sequential dependency chain (events.ts must
    define REVIEW_PERSPECTIVES and the new error event variant before
    schemas.ts/config.ts/parallel-reviewer.ts can import/emit them), which is a
    strong negative signal for expedition. Compile uses planner +
    plan-review-cycle because the PRD is precise about file/line targets and a
    plan-quality gate ensures the compiler imports the new const correctly and
    the DAEMON_API_VERSION bump isn't forgotten. Build uses implement followed
    by review-cycle: the change touches the wire-protocol source of truth
    (events.ts), the schema enforcement boundary, and an agent runtime path, so
    a single review pass is insufficient - iterative review-fix-evaluate catches
    missed acceptance criteria (e.g. forgetting the api-version bump, missing
    reducer registry entry, untested error path). Review uses parallel strategy
    with code + test perspectives at standard strictness: code perspective
    validates the schema/type tightening and event-emission correctness; test
    perspective verifies the agent-stage-map.test.ts update covers the error
    event and that AC #2 (error event visibility) and AC #3 (valid 6-perspective
    set still works) are demonstrably tested. Security/api/docs perspectives are
    unnecessary - this is internal type/event plumbing with no external API
    surface change beyond the additive event variant (handled by the api-version
    bump called out in scope). maxRounds: 2 is sufficient for a change this
    localized; autoAcceptBelow: suggestion keeps trivial nits from blocking."
