name: simplify-review-cycle-remove-severity-filter-and-fix-per-reviewer-hover-scoping-in-monitor-ui
description: "Two related review-cycle cleanups: (1) remove the unused
  autoAcceptBelow severity filter from config/schema/engine/UI/tests; (2) fix
  the monitor UI so each reviewer's hover shows only that reviewer's
  perspective-scoped issues while the fixer hover continues to show the
  merged-and-deduped set."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-remove-severity-filter
    name: Remove autoAcceptBelow severity filter from config, schema, engine, UI,
      and tests
    depends_on: []
    branch: simplify-review-cycle-remove-severity-filter-and-fix-per-reviewer-hover-scoping-in-monitor-ui/plan-01-remove-severity-filter
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-fix-per-reviewer-hover-scoping
    name: Scope per-reviewer hover to perspective-specific issues in monitor UI
    depends_on:
      - plan-01-remove-severity-filter
    branch: simplify-review-cycle-remove-severity-filter-and-fix-per-reviewer-hover-scoping-in-monitor-ui/plan-02-fix-per-reviewer-hover-scoping
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
    maxRounds: 1
    evaluatorStrictness: standard
  rationale: "The PRD itself recommends excursion, and that's correct: ~13 files
    across three packages (client, engine, monitor-ui) but the change shape is
    uniform (mechanical deletion of autoAcceptBelow + one targeted reducer
    extension and UI prop wiring). A single planner session can enumerate all
    plans, file changes, and cross-package ordering — none of the expedition
    signals apply (no 4+ independent subsystems, the dependency chain is
    sequential client → engine → monitor-ui, and the type/schema deletion is a
    classic 'change a definition, ripple to consumers' refactor that argues
    against parallel module planning). plan-review-cycle is included because the
    change crosses three packages and a missed reset path or a leftover schema
    reference would break type-check or idempotence — a plan review gate adds
    real value at low cost. For build, implement + review-cycle is the standard
    excursion pipeline; no doc-author/doc-sync because the PRD is explicit that
    no user-facing docs change (it removes a never-used config knob and fixes a
    UI scoping bug), and no test-write/test-cycle because the PRD already
    prescribes specific test edits (delete three tests in
    review-strategy-wiring.test.ts, add one perspective-complete reducer test)
    which the implementer handles inline. Review perspectives are 'code'
    (reducer state field, reset paths, plan-row prop wiring, hover render
    branching are all easy to get subtly wrong) and 'api' (schema/type deletions
    span @eforge-build/client, engine config, engine pipeline composer mirror
    schema, and monitor-ui — the api perspective catches missed call sites and
    cross-package contract drift). One round at standard strictness fits the
    risk profile: low-risk mechanical work but with enough cross-package surface
    to warrant a careful pass."
