name: audit-eforge-plugin-and-packages-pi-eforge-for-capability-drift-and-close-gaps
description: "Close the four parity gaps surfaced by the plugin/Pi audit:
  register the missing eforge:recover slash command in Pi, remove the unused
  eforge_enqueue MCP tool from the plugin, fix the plugin recover skill's
  incorrect cross-reference, and extend the parity script to cover playbook and
  recover so future drift is caught automatically."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-close-parity-gaps
    name: Close plugin/Pi parity gaps and extend parity script
    depends_on: []
    branch: audit-eforge-plugin-and-packages-pi-eforge-for-capability-drift-and-close-gaps/close-gaps
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - doc-update
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - consistency
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is a parity audit between two consumer-facing packages
    (eforge-plugin/ and packages/pi-eforge/). The work is well-scoped: enumerate
    CLI commands, MCP tools, and skills on each side, build a parity matrix, and
    either close gaps or document them as intentional. A single planner session
    can comfortably enumerate the inventory across both packages and decompose
    closure work into ordered plans, so excursion is the right scope (not
    expedition - the surfaces are small and tightly related, not 4+ independent
    subsystems). plan-review-cycle is included because the parity matrix itself
    is the planner's key artifact and reviewers need to verify each row's
    disposition before any code changes land - catching scope drift or missing
    rows here is much cheaper than after implementation. The build pipeline runs
    implement first, then parallelizes review-cycle with doc-update since the
    PRD touches user-facing surfaces (CLI commands, MCP tools, skills) where
    keeping any inline help/descriptions and the plugin manifest in sync
    matters; doc-update doesn't declare review-cycle predecessors so they can
    run concurrently. Review uses single strategy with correctness and
    consistency perspectives - the risk profile is medium (consumer surface
    drift, version bump discipline, no inlined client code per AGENTS.md), not
    security-critical, so standard strictness with 2 rounds is appropriate.
    autoAcceptBelow=suggestion keeps the loop tight while still gating warnings
    and above."
