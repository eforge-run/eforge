name: extend-09-usage-aware-profile-router
description: Deliver pre-build runtime execution of profile router extensions so
  queued PRDs without explicit profile overrides are routed at dispatch time
  with observable provenance, validation, fail-open semantics, and best-effort
  usage signals.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
  - pnpm docs:check
plans:
  - id: plan-01-sdk-and-wire-contracts
    name: Profile router SDK contracts, wire events, and recorder validation
    depends_on: []
    branch: extend-09-usage-aware-profile-router/plan-01-sdk-and-wire-contracts
    build:
      - implement
      - doc-sync
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
        - api
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-runtime-and-integration
    name: Profile router runtime, scheduler integration, usage provider, example,
      docs
    depends_on:
      - plan-01-sdk-and-wire-contracts
    branch: extend-09-usage-aware-profile-router/plan-02-runtime-and-integration
    build:
      - implement
      - doc-sync
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
        - test
      maxRounds: 2
      evaluatorStrictness: strict
    agents:
      builder:
        effort: xhigh
        rationale: Touches QueueScheduler async lifecycle, daemon usage-provider
          plumbing, frontmatter mutation/commit, and new diagnostic event
          ordering; multiple integration boundaries with strict ordering
          constraints (route before session:profile/session:start, validate
          before --profile spawn arg, no active-marker mutation).
      reviewer:
        effort: high
        rationale: Scheduler async refactor and daemon DB plumbing need careful
          integration review for duplicate-launch guards, abort/shutdown
          semantics, and fail-open correctness.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - docs
      - test
      - verify
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "The PRD itself recommends Excursion and that fits: this is
    cross-cutting feature work (SDK contract, engine extension runtime, queue
    scheduler, daemon usage provider, wire events, docs, examples, tests) but
    cohesive enough for a single planner to enumerate plans and resolve
    cross-plan dependencies. There's a clear foundation plan (SDK/wire
    schema/runtime types) followed by dependent verticals (scheduler
    integration, daemon usage provider, docs/examples) — a sequential dependency
    chain rather than independent subsystems, which is a negative expedition
    signal. Compile uses planner + plan-review-cycle because integration
    ordering matters (routing must run before parent session:profile emission,
    validation before spawn, no active marker mutation) and a plan-quality gate
    catches scope/ordering issues before build. Build runs implement in parallel
    with doc-author (extension docs, SDK README, examples README, and the
    configurable Claude→Codex→local example are all named deliverables with no
    implement predecessor), then doc-sync to reconcile existing
    docs/extensions.md, docs/extensions-api.md, and runtime support tables
    against the diff, then review-cycle for iterative quality (the PRD lists
    multiple test surfaces and explicit acceptance criteria including 'tests
    prove marker files are unchanged'). Review uses parallel strategy with
    code/api/docs/test/verify perspectives: code for engine/scheduler changes,
    api for the SDK contract change (selectBuildProfile vs deprecated resolve)
    and new wire events, docs to validate the runtime-supported claims and quota
    caveats, test to ensure first-valid-wins/timeout/invalid/explicit-override
    coverage is real, and verify to confirm acceptance criteria (no marker
    mutation, session metadata reflects routed profile). maxRounds=2 and
    standard strictness fit a feature-grade change that isn't security-critical
    but has multiple integration touchpoints."
