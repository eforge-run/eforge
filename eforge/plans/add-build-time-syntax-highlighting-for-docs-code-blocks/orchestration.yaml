name: add-build-time-syntax-highlighting-for-docs-code-blocks
description: Add build-time syntax highlighting for TypeScript code fences on
  the public docs site by replacing remark-html with a remark-to-rehype pipeline
  using rehype-pretty-code + Shiki, configuring github-light/github-dark themes,
  preserving existing prose styling, and updating tests to verify highlighted
  markup.
base_branch: main
mode: excursion
validate:
  - pnpm --filter @eforge-build/web type-check
  - pnpm --filter @eforge-build/web build
  - pnpm test
plans:
  - id: plan-01-shiki-highlighting
    name: Markdown pipeline with rehype-pretty-code syntax highlighting
    depends_on: []
    branch: add-build-time-syntax-highlighting-for-docs-code-blocks/plan-01-shiki-highlighting
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
  defaultBuild:
    - - implement
      - doc-author
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - code
      - verify
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "This is a focused excursion-scope task: swap the Markdown rendering
    pipeline in a single file (web/lib/content.ts), add a few dependencies to
    @eforge-build/web, and tweak globals.css to preserve styling. All changes
    are localized to the web package and can be enumerated in one planner
    session — no need for module-level delegation. A single planner stage
    produces the plan(s); plan-review-cycle is unnecessary because the scope is
    tight and well-defined in the PRD. For build, implement does the pipeline
    swap and CSS tweaks, while doc-author runs in parallel since the PRD
    explicitly calls for adding/updating tests in web/__tests__/content.test.ts
    (test-style doc artifacts authored alongside implementation are within
    doc-author's remit; tests proper are covered by review's verify perspective
    and the type-check acceptance criterion). A single-strategy review-cycle
    with code + verify perspectives at standard strictness catches pipeline
    wiring mistakes, theme config errors, and confirms the type-check + test
    acceptance criteria. No security/api perspectives needed (no auth, data, or
    public API surface changes); doc-sync is unnecessary because there are no
    changed symbols/APIs that would leave stale references in other docs."
