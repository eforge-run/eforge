name: monitor-ui-tooltip-surface-real-tier-and-per-reviewer-perspective
description: Surface real tier (and source) and per-reviewer perspective on
  every agent:start event so the monitor UI's agent-strip tooltip never displays
  "unknown" and distinguishes parallel reviewers by perspective.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-tier-and-perspective-on-agent-start
    name: Surface tier and reviewer perspective on agent:start
    depends_on: []
    branch: monitor-ui-tooltip-surface-real-tier-and-per-reviewer-perspective/tier-and-perspective
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - code
      - api
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is a tightly-scoped data-flow plumbing change touching 8 files
    across 2 packages (engine + monitor-ui). The PRD itself recommends
    'excursion' and explicitly rules out expedition (no parallel subsystems,
    every edit unblocks the next, lands as a single PR). Excursion is correct.
    Compile uses planner + plan-review-cycle to ensure the planner correctly
    enumerates all 8 file edits and catches any missed touchpoints (e.g., all
    three Pi harness branches, both AgentRunOptions and
    BuildAgentStartEventOptions) before build. Build is minimal: implement
    followed by review-cycle. No doc-author/doc-sync because this change touches
    no user-facing docs or public APIs (it's internal event schema plumbing). No
    test-write/test-cycle because the PRD explicitly notes 'no new tests beyond
    a regression check' and existing pnpm test must pass. Review uses single
    strategy with code + api perspectives (api because event schema and
    AgentRunOptions are internal contracts between engine and monitor-ui that
    must stay consistent) at standard strictness with maxRounds 2 - enough to
    catch the easy-to-miss spots (all three Pi branches, both reducer and
    tooltip wiring) without over-engineering. autoAcceptBelow suggestion lets
    cosmetic nits through automatically."
