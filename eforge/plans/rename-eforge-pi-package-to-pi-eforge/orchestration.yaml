name: rename-eforge-pi-package-to-pi-eforge
description: Rename @eforge-build/eforge-pi package and its directory to
  @eforge-build/pi-eforge to align with the Pi ecosystem's pi- prefix
  convention.
created: 2026-04-13
compiled: 2026-04-13
mode: excursion
base_branch: main
validate:
  - pnpm install
  - pnpm -r type-check
  - pnpm -r build
  - pnpm test
plans:
  - id: plan-01-rename-package
    name: Rename eforge-pi package to pi-eforge
    depends_on: []
    branch: rename-eforge-pi-package-to-pi-eforge/rename-package
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - docs
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
  defaultBuild:
    - implement
    - doc-update
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - general
    maxRounds: 1
    evaluatorStrictness: lenient
  rationale: "This is a mechanical rename touching a package directory, package
    metadata, publish script, and several docs. It's larger than an errand
    (multi-file, touches workspace config and docs) but well below expedition
    scale. A single planner pass is sufficient - no architecture or module
    decomposition needed. Build stages: implement does the rename and edits,
    doc-update (sequential, after implement) ensures the
    README/AGENTS/architecture doc references are consistent, and a lightweight
    review-cycle catches any missed `eforge-pi` references per the
    exhaustive-grep acceptance criterion. Review is lenient/single-perspective
    with one round since the change is mechanical and verified by `pnpm
    install`, `pnpm -r build`, `pnpm -r type-check`, and `pnpm test` rather than
    subjective quality judgments."
