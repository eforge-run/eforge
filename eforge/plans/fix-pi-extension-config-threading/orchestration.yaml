name: fix-pi-extension-config-threading
description: Thread pi.extensions config (autoDiscover, include, exclude) from
  config parsing through to PiBackend and implement include/exclude filtering in
  extension discovery
created: 2026-03-30
compiled: 2026-03-30
mode: config-threading-fix
base_branch: main
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-extension-config-threading
    name: Fix Pi Extension Config Threading
    depends_on: []
    branch: fix-pi-extension-config-threading/extension-config-threading
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
