name: auto-open-eforge-session-plan-markdown-files-when-creating-or-resuming-a-plan
description: "Auto-open session plan markdown files when /eforge:plan creates a
  new plan or resumes a selected plan. Adds a `path` field to the daemon `GET
  /api/session-plan/show` response, an optional `open?: boolean` parameter to
  the `eforge_session_plan` tool surface in both the Pi extension and Claude
  Code MCP proxy, and best-effort desktop file-opening that runs after
  `create`/`show`. Updates the Pi and plugin planning skills in lockstep, bumps
  the Claude Code plugin version, and adds tests covering the new path field and
  the opener helper."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-auto-open-session-plan
    name: Auto-open session plan markdown on create and resume
    depends_on: []
    branch: auto-open-eforge-session-plan-markdown-files-when-creating-or-resuming-a-plan/plan-01-auto-open-session-plan
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - api
        - docs
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - docs
      - test
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "The PRD explicitly recommends Excursion and the work fits cleanly: a
    single planner session can enumerate every change (daemon route + wire type,
    Pi extension, Claude MCP proxy, both skill docs, plugin version bump, tests)
    and resolve their ordering. There is no delegated module planning required,
    and the changes share interfaces (SessionPlanShowResponse, tool schemas) so
    independent expedition modules would just collide. plan-review-cycle is
    included because the PRD spans multiple consumer surfaces with a 'keep Pi
    and Claude in sync' guardrail and an additive wire-shape change - a quality
    gate before build catches scope/coverage gaps cheaply. For build, implement
    runs in parallel with doc-author since the planning skill docs (eforge-plan
    SKILL.md and plan/plan.md) are plan-specified documentation that doesn't
    depend on code being written first; doc-sync follows implement to catch any
    other doc references to the session-plan tool surface or daemon show
    response shape; review-cycle then validates with parallel perspectives.
    Perspectives chosen: code (core implementation correctness), api (wire shape
    addition to SessionPlanShowResponse and new optional open? parameter on tool
    surface), docs (two skill docs must stay in sync and plugin version bumped),
    test (PRD calls out specific test additions for show route path and opener
    helper). Standard strictness with 2 rounds is appropriate - not
    security/data sensitive, but additive API change deserves more than a single
    pass."
