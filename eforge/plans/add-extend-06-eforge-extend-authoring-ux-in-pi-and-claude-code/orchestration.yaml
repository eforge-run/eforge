name: add-extend-06-eforge-extend-authoring-ux-in-pi-and-claude-code
description: Add parity-checked /eforge:extend conversational authoring skills
  to the Claude Code plugin and Pi extension, wire command/manifest/docs/test
  surfaces, and regenerate reference docs for the new skill.
base_branch: main
mode: excursion
validate:
  - node scripts/check-skill-parity.mjs
  - pnpm test -- test/extension-authoring-skill.test.ts
    test/extension-tooling-wiring.test.ts
  - pnpm docs:generate
  - pnpm docs:check
  - pnpm type-check
plans:
  - id: plan-01-extend-authoring-ux
    name: Add /eforge:extend authoring skills and wiring
    depends_on: []
    branch: add-extend-06-eforge-extend-authoring-ux-in-pi-and-claude-code/plan-01-extend-authoring-ux
    build:
      - implement
      - doc-sync
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - docs
        - test
        - security
        - verify
      maxRounds: 2
      evaluatorStrictness: strict
    agents:
      builder:
        effort: high
        rationale: The implementation is not architecturally broad, but the paired skill
          bodies must encode nuanced extension runtime/deferred capability
          guidance while remaining parity-normalized across plugin and Pi
          surfaces.
      reviewer:
        effort: high
        rationale: Review needs to verify parity, generated docs, tests, plugin
          versioning, and security/trust wording for unsandboxed TypeScript
          extensions.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - test-write
    - review-cycle
    - test-cycle
    - validate
  defaultReview:
    strategy: parallel
    perspectives:
      - code
      - api
      - docs
      - test
      - security
      - verify
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: This is a focused multi-file consumer-integration feature spanning Pi
    skills, Claude Code plugin skills, command/manifest wiring, docs generation,
    and tests, so excursion is appropriate. A planner plus plan-review-cycle
    gives enough quality control without expedition module planning.
    Implementation can run alongside doc authoring, followed by documentation
    sync, test creation, iterative review, test execution, and final validation
    for the specified commands. Parallel review perspectives cover code wiring,
    API/tool surface parity, docs/reference updates, test coverage,
    security/trust messaging, and acceptance verification with standard
    strictness for a user-facing feature.
