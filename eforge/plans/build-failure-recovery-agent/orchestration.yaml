name: build-failure-recovery-agent
description: Add an advisory build-failure recovery analyst that, when a build
  fails, reads surviving artifacts (PRD, feature branch, plan state, event log),
  produces a structured BuildFailureSummary, runs a closed-prompt no-tools agent
  to emit a typed RecoveryVerdict (retry|split|abandon|manual), and writes a
  sidecar markdown + JSON twin next to the failed PRD. Daemon spawns recovery as
  a clean subprocess on plan:build:failed; monitor UI surfaces verdict +
  confidence; CLI/MCP/Pi parity exposed.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-engine-core
    name: "Engine Core: Schema, Agent, Summary, Sidecar"
    depends_on: []
    branch: build-failure-recovery-agent/engine-core
    agents:
      builder:
        effort: high
        rationale: Introduces a new agent role end-to-end (schema, parser, prompt, agent
          body, summary builder, sidecar writer). Requires careful mirroring of
          staleness-assessor patterns and integration with config + runtime
          registry.
    build: &a1
      - implement
      - - review-cycle
        - doc-update
      - test-write
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - architecture
        - api-design
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
  - id: plan-02-cli-and-engine-api
    name: CLI Subcommand + EforgeEngine.recover
    depends_on:
      - plan-01-engine-core
    branch: build-failure-recovery-agent/cli-and-engine-api
    agents:
      builder:
        effort: medium
        rationale: Wires existing engine primitives (built in plan-01) into a public
          engine method and CLI subcommand. Mostly glue; medium effort is
          sufficient.
    build: *a1
    review: *a2
  - id: plan-03-daemon-mcp-pi
    name: Daemon Trigger + MCP Tool + Pi Parity
    depends_on:
      - plan-02-cli-and-engine-api
    branch: build-failure-recovery-agent/daemon-mcp-pi
    agents:
      builder:
        effort: high
        rationale: Touches three consumer surfaces (daemon HTTP, MCP proxy, Pi
          extension) plus a route-version bump. Cross-package coordination per
          the AGENTS.md sync rule warrants high effort.
    build: *a1
    review: *a2
  - id: plan-04-monitor-ui
    name: "Monitor UI: Verdict Chip + Sidecar Link"
    depends_on:
      - plan-03-daemon-mcp-pi
    branch: build-failure-recovery-agent/monitor-ui
    agents:
      builder:
        effort: medium
        rationale: Localized UI work in two components; shadcn/ui patterns already
          established in the codebase.
    build: *a1
    review: *a2
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This PRD touches multiple coordinated surfaces (engine recovery
    module, schemas, agents, prompts, events, CLI, MCP proxy/factory, daemon
    server, monitor UI, Pi extension, plugin manifest), but they form a
    sequential dependency chain rooted in a single new agent and schema rather
    than 4+ independently-planned subsystems. A single planner session can
    enumerate the file changes and ordering (schema -> agent + summary + sidecar
    -> CLI/MCP -> daemon trigger -> UI/Pi parity), so excursion is correct;
    expedition would be over-engineered. plan-review-cycle is added because the
    PRD has many enumerated acceptance criteria and parity-of-surface
    requirements (CLI + MCP + Pi + plugin + UI) that benefit from a quality gate
    before build. For build stages: implement first, then review-cycle in
    parallel with doc-update (doc-update only depends on implement, satisfying
    the parallel-group rule), then test-write sequentially since the PRD
    explicitly requires `test/recovery.test.ts` covering all four verdicts and
    schema round-trip. Review uses single strategy with
    correctness/architecture/api-design perspectives because the PRD introduces
    a new public schema (RecoveryVerdict), a stable JSON sidecar contract, and
    cross-package surfaces that must stay consistent; standard strictness fits
    feature work that is read-only and advisory (no security/data risk
    warranting strict). maxRounds: 2 is sufficient given the closed prompt and
    template (mirroring staleness-assessor) constrain implementation variance."
