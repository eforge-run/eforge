name: build-failure-recovery-agent
description: "Add an advisory build-failure recovery analyst: when a build
  fails, a tools-none agent reads surviving artifacts (failed PRD, feature
  branch, plan state, event log) and writes a structured RecoveryVerdict sidecar
  next to the failed PRD. v1 is read-only; the daemon spawns recovery as a clean
  subprocess via a new `eforge recover` CLI subcommand and exposes parity
  surfaces in MCP, the Pi extension, and the monitor UI."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-recovery-engine-core
    name: "Recovery engine core: summary, agent, schema, sidecar, events"
    depends_on: []
    branch: build-failure-recovery-agent/engine-core
    agents:
      builder:
        effort: high
        rationale: Net-new agent role plus a forensic summary builder that has to handle
          missing/partial inputs (failed mid-build state). Mirrors
          staleness-assessor but introduces several new types that must line up
          with consumers in plan-02.
      reviewer:
        effort: high
        rationale: Schema and event shape are the stable contract a future auto-executor
          will consume; getting field names and discriminants right matters.
    build: &a1
      - implement
      - review-cycle
      - - doc-update
        - test-write
    review: &a2
      strategy: parallel
      perspectives:
        - correctness
        - architecture
        - consistency
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
  - id: plan-02-recovery-surfaces
    name: "Recovery surfaces: CLI, MCP, daemon trigger, monitor UI, Pi parity"
    depends_on:
      - plan-01-recovery-engine-core
    branch: build-failure-recovery-agent/surfaces
    agents:
      builder:
        effort: high
        rationale: Five distinct surface integrations (CLI, MCP, daemon subprocess
          spawn, monitor UI, Pi extension) plus a plugin version bump. Each has
          its own conventions to follow.
    build: *a1
    review: *a2
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: This PRD ships three tightly-coupled components (BuildFailureSummary,
    recovery-analyst agent, daemon trigger + sidecar) plus parity surfaces (CLI,
    MCP proxy, Pi extension, monitor UI). The pieces have sequential
    dependencies (schema -> agent -> CLI -> daemon trigger -> UI) and share
    types/contracts across packages, which is the textbook 'sequential
    dependency chain' negative signal for expedition - a single planner session
    can comfortably enumerate the plans and cross-package edits. Excursion is
    the right scope. Compile uses planner + plan-review-cycle because the PRD
    spans many files across packages (engine, eforge, monitor, monitor-ui,
    pi-eforge, plugin) and the prd-completeness rule plus closed-prompts rule
    must be reflected in the plans, so a quality gate on planning pays off.
    Build pipeline runs implement, then review-cycle (the work touches new agent
    wiring, schema, daemon subprocess spawning, and event types - all
    correctness-critical), then doc-update and test-write in parallel (neither
    conflicts with the other, both depend only on implement which has already
    completed sequentially). Review uses the parallel strategy with correctness
    (verdict schema, parser, sidecar formatting), architecture (engine/plugin
    boundary, closed-prompt rule, no build-permit consumption, subprocess
    isolation), and consistency (CLI/MCP/Pi/plugin parity per AGENTS.md sync
    rule) perspectives. maxRounds=2 with standard strictness fits a
    feature-scale change that is read-only and advisory (lower blast radius than
    code-modifying agents) but still has invariants worth enforcing.
