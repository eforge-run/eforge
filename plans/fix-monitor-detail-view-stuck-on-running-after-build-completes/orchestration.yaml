    name: Upstream runId Stamping and Recorder Simplification
    depends_on: []
    branch: fix-monitor-detail-view-stuck-on-running-after-build-completes/upstream-runid-stamping
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
