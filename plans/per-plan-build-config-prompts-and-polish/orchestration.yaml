name: per-plan-build-config-prompts-and-polish
description: Update prompts, agent code, monitor UI, and plugin docs to fully
  support the per-plan build config model
created: 2026-03-20
compiled: 2026-03-20
mode: excursion
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-agent-code-and-tests
    name: Agent Code, Pipeline Wiring, and Tests
    depends_on: []
    branch: per-plan-build-config-prompts-and-polish/agent-code-and-tests
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-prompts-ui-docs
    name: Prompts, Monitor UI, and Plugin Docs
    depends_on:
      - plan-01-agent-code-and-tests
    branch: per-plan-build-config-prompts-and-polish/prompts-ui-docs
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: "Multi-file feature work or refactors. Use when changes touch many
    files but are tightly coupled - e.g., type signature changes that cascade to
    consumers, interface refactors, rename-and-update-all-callers. The key test:
    can every piece pass type-check independently? If not, use excursion."
  compile:
    - planner
    - plan-review-cycle
  build:
    - - implement
      - doc-update
    - review
    - review-fix
    - evaluate
  agents: {}
  review:
    strategy: auto
    perspectives:
      - code
    maxRounds: 1
    evaluatorStrictness: standard
