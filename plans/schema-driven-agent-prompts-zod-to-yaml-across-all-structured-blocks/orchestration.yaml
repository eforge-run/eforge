name: schema-driven-agent-prompts-zod-to-yaml-across-all-structured-blocks
description: Apply Zod-to-YAML schema pattern to all structured XML blocks
  across agent prompts, replacing hand-written format docs with generated schema
  YAML
created: 2026-03-18
compiled: 2026-03-18
mode: excursion
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-schemas-and-review-issue
    name: Create schemas.ts and Apply ReviewIssue Schema
    depends_on: []
    branch: schema-driven-agent-prompts-zod-to-yaml-across-all-structured-blocks/schemas-and-review-issue
  - id: plan-02-remaining-schemas
    name: Wire Remaining Schemas into Prompts and Types
    depends_on:
      - plan-01-schemas-and-review-issue
    branch: schema-driven-agent-prompts-zod-to-yaml-across-all-structured-blocks/remaining-schemas
profile:
  description: Multi-file feature work or refactors that need planning and review
    but fit in a single plan. Use for medium-complexity tasks with cross-file
    changes.
  compile:
    - planner
    - plan-review-cycle
  build:
    - - implement
      - doc-update
    - review
    - review-fix
    - evaluate
  agents: {}
  review:
    strategy: auto
    perspectives:
      - code
    maxRounds: 1
    evaluatorStrictness: standard
