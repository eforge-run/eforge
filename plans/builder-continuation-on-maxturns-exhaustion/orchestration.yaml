name: builder-continuation-on-maxturns-exhaustion
description: Enable the implement stage to chain multiple builder invocations
  with managed handoff when one maxes out on turns
created: 2026-03-25
compiled: 2026-03-25
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-continuation-core
    name: Builder Continuation on maxTurns Exhaustion
    depends_on: []
    branch: builder-continuation-on-maxturns-exhaustion/continuation-core
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: "Multi-file feature work or refactors. Use when changes touch many
    files but are tightly coupled - e.g., type signature changes that cascade to
    consumers, interface refactors, rename-and-update-all-callers. The key test:
    can every piece pass type-check independently? If not, use excursion."
  compile:
    - planner
    - plan-review-cycle
